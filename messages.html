<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الرسائل - YADWOR</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#1877f2;--bg:#f0f2f5;--card:#ffffff;--txt:#050505;--sub:#65676b;--border:#eee;--red:#e41e3f;--green:#42b72a;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--txt);padding-top:60px;padding-bottom:70px;}

/* ─── Facebook Shimmer ─── */
.sk{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:sk 1.5s infinite;border-radius:8px;}
.sk-circle{border-radius:50%!important;}
@keyframes sk{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* ─── Loader — Facebook Shimmer بدلاً من Spinner ─── */
#loader{position:fixed;inset:0;background:var(--card);z-index:9999;display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-start;overflow:hidden;padding-top:60px;}
.sk-chat-item{display:flex;align-items:center;gap:12px;padding:14px 15px;border-bottom:1px solid var(--border);background:white;width:100%;}

/* ─── Avatar مع Shimmer ─── */
.av-sk-wrap{position:relative;width:54px;height:54px;flex-shrink:0;}
.av-sk-wrap .av-shimmer{position:absolute;inset:0;border-radius:50%;background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:sk 1.5s infinite;}
.av-sk-wrap .av-shimmer.done{display:none;}
.av-sk-wrap img.av{position:absolute;inset:0;width:100%;height:100%;border-radius:50%;object-fit:cover;border:2px solid #e1e8ed;opacity:0;transition:opacity .25s;}
.av-sk-wrap img.av.loaded{opacity:1;}

/* ─── Navbar ─── */
.top-navbar{position:fixed;top:0;left:0;right:0;height:60px;background:var(--card);display:flex;justify-content:space-between;align-items:center;padding:0 15px;z-index:1000;box-shadow:0 1px 4px rgba(0,0,0,0.1);}
.nav-title{font-size:18px;font-weight:800;}
.nav-btn{background:none;border:none;cursor:pointer;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .2s;color:var(--txt);}
.nav-btn:hover{background:var(--bg);}
.nav-btn svg{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ─── Search ─── */
.search-wrap{padding:10px 12px;background:var(--card);border-bottom:1px solid var(--border);}
.search-inner{display:flex;align-items:center;background:var(--bg);border-radius:22px;padding:8px 14px;gap:8px;}
.search-inner svg{width:18px;height:18px;fill:none;stroke:var(--sub);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.search-inner input{flex:1;border:none;background:transparent;outline:none;font-size:14px;font-family:'Tajawal',sans-serif;color:var(--txt);}
.search-inner input::placeholder{color:#aaa;}

/* ─── Tabs ─── */
.tabs-bar{display:flex;background:var(--card);border-bottom:2px solid var(--border);position:sticky;top:60px;z-index:100;}
.tab-btn{flex:1;padding:12px;font-size:13px;font-weight:700;color:var(--sub);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;font-family:'Tajawal',sans-serif;transition:.2s;margin-bottom:-2px;}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);}

/* ─── Chat List ─── */
.chat-list{display:flex;flex-direction:column;background:var(--card);}

/* ─── Chat Item ─── */
.chat-item{display:flex;align-items:center;gap:0;padding:0;border-bottom:1px solid var(--border);background:var(--card);transition:background .2s;position:relative;}
.chat-item.pinned-item{background:#f0f7ff;}
.chat-item-body{display:flex;align-items:center;gap:12px;flex:1;min-width:0;padding:13px 0 13px 15px;cursor:pointer;}
.chat-item:active .chat-item-body{background:#f0f2f5;}

/* صورة + نقطة أونلاين */
.chat-av-wrap{position:relative;width:54px;height:54px;flex-shrink:0;}
.chat-av-wrap img.av{width:100%;height:100%;border-radius:50%;object-fit:cover;border:2px solid #e1e8ed;}
.online-dot{position:absolute;bottom:2px;right:2px;width:13px;height:13px;background:var(--green);border-radius:50%;border:2.5px solid white;}

/* معلومات المحادثة */
.chat-info{flex:1;min-width:0;}
.chat-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.chat-name-row{display:flex;align-items:center;gap:5px;min-width:0;}
.chat-name-txt{font-size:15px;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pin-icon{display:flex;align-items:center;flex-shrink:0;}
.chat-time{font-size:12px;color:#8a8d91;white-space:nowrap;flex-shrink:0;padding-right:4px;font-weight:500;background:#f4f6f9;padding:2px 7px;border-radius:10px;}
.chat-bottom{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.chat-preview-txt{font-size:13px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.chat-preview-txt.bold{color:var(--txt);font-weight:700;}
.unread-badge{background:var(--primary);color:white;font-size:11px;font-weight:700;border-radius:50%;min-width:20px;height:20px;display:flex;align-items:center;justify-content:center;padding:0 4px;flex-shrink:0;}

/* زر ثلاث نقاط */
.chat-menu-btn{background:none;border:none;cursor:pointer;width:44px;height:100%;min-height:72px;display:flex;align-items:center;justify-content:center;color:var(--sub);flex-shrink:0;transition:background .2s;border-right:none;}
.chat-menu-btn:hover{background:var(--bg);}
.chat-menu-btn svg{width:20px;height:20px;}

/* ─── قائمة السياق ─── */
.ctx-menu{position:fixed;background:white;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,0.15);z-index:3000;min-width:200px;overflow:hidden;animation:ctxIn .16s ease;}
@keyframes ctxIn{from{opacity:0;transform:scale(.92);}to{opacity:1;transform:scale(1);}}
.ctx-item{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;transition:background .15s;font-size:14px;font-weight:600;color:var(--txt);}
.ctx-item:hover{background:#f5f7fa;}
.ctx-item.danger{color:var(--red);}
.ctx-item svg{width:19px;height:19px;flex-shrink:0;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.ctx-sep{height:1px;background:var(--border);margin:3px 0;}
.ctx-overlay{position:fixed;inset:0;z-index:2999;}

/* ─── Divider مثبتة ─── */
.pinned-divider{padding:7px 15px;font-size:11px;font-weight:700;color:var(--sub);background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:5px;}
.pinned-divider svg{width:12px;height:12px;fill:var(--sub);flex-shrink:0;}

/* ─── Empty ─── */
.empty-state{text-align:center;padding:70px 20px;color:var(--sub);}
.empty-state svg{width:64px;height:64px;fill:none;stroke:#ddd;stroke-width:1.5;margin:0 auto 16px;display:block;}
.empty-state h3{font-size:17px;font-weight:700;margin-bottom:8px;color:#aaa;}
.empty-state p{font-size:13px;color:#bbb;}

/* ─── Bottom Nav ─── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--card);display:flex;justify-content:space-around;align-items:center;border-top:1px solid var(--border);z-index:1000;}
.nav-item{display:flex;flex-direction:column;align-items:center;justify-content:center;color:#90949c;font-size:10px;gap:3px;flex:1;height:100%;cursor:pointer;border:none;background:none;font-family:'Tajawal',sans-serif;}
.nav-item svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.nav-item.active{color:var(--primary);}
.nav-item.active svg{stroke:var(--primary);}

/* ─── New Chat Modal ─── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:2000;display:none;justify-content:center;align-items:flex-end;}
.modal-ov.open{display:flex;}
.modal-sheet{background:white;width:100%;border-radius:20px 20px 0 0;max-height:80vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.25,.8,.25,1);}
.modal-ov.open .modal-sheet{transform:translateY(0);}
.sheet-hdr{display:flex;justify-content:space-between;align-items:center;padding:18px 18px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:white;z-index:5;}
.sheet-title{font-size:17px;font-weight:800;}
.sheet-cls{background:none;border:none;cursor:pointer;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--sub);}
.sheet-cls svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.sheet-body{padding:8px 12px 24px;}
.user-row{display:flex;align-items:center;gap:12px;padding:11px 8px;border-radius:12px;cursor:pointer;transition:background .15s;}
.user-row:hover{background:var(--bg);}
.user-row-name{font-weight:700;font-size:14px;margin-bottom:3px;}
.user-row-sub{font-size:12px;color:var(--sub);display:flex;align-items:center;gap:4px;}
.user-row-sub svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}

/* ─── Toast ─── */
#msg-toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(0,0,0,0.82);color:#fff;padding:11px 22px;border-radius:30px;font-size:14px;font-weight:700;z-index:9999;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;white-space:nowrap;backdrop-filter:blur(6px);}
#msg-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ─── Confirm Dialog ─── */
.confirm-ov{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:5000;display:flex;align-items:center;justify-content:center;padding:20px;}
.confirm-box{background:white;border-radius:18px;width:100%;max-width:320px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.18);}
.confirm-body{padding:24px 20px 18px;text-align:center;}
.confirm-icon{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.confirm-icon svg{width:26px;height:26px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.confirm-title{font-size:16px;font-weight:800;margin-bottom:8px;}
.confirm-desc{font-size:13px;color:var(--sub);line-height:1.6;}
.confirm-btns{display:flex;border-top:1px solid var(--border);}
.confirm-btn{flex:1;padding:14px;border:none;background:none;font-size:14px;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif;}
.confirm-btn.cancel{color:var(--sub);border-left:1px solid var(--border);}
.confirm-btn.del{color:var(--red);}
</style>

function T(k){ return (_TR[_lang]&&_TR[_lang][k])?_TR[_lang][k]:(_TR['ar'][k]||k); }

function applyLang(lang) {
  _lang = lang;
  document.documentElement.setAttribute('lang', lang);
  document.documentElement.setAttribute('dir', lang==='ar'?'rtl':'ltr');
  document.title = T('title')+' - YADWOR';
  /* navbar */
  const navTitle = document.querySelector('.nav-title');
  if (navTitle) navTitle.textContent = T('title');
  /* search placeholder */
  const si = document.getElementById('searchInput');
  if (si) si.placeholder = T('search');
  /* tabs */
  const tabAll = document.getElementById('tab-all');
  if (tabAll) tabAll.textContent = T('tabAll');
  const tabArc = document.getElementById('tab-archive');
  if (tabArc) {
    /* تبويب الأرشيف — يحتوي SVG + نص */
    tabArc.innerHTML = `<svg viewBox="0 0 24 24" width="14" height="14" style="fill:none;stroke:currentColor;stroke-width:2;vertical-align:middle;margin-${lang==='ar'?'left':'right'}:4px;"><rect x="2" y="3" width="20" height="4" rx="1"/><path d="M4 7v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7"/><line x1="10" y1="12" x2="14" y2="12"/></svg>${T('tabArchive')}`;
  }
  /* bottom nav — بالـ IDs المحددة */
  var navMap = {
    'nav-lbl-home':    T('home'),
    'nav-lbl-search':  T('search2'),
    'nav-lbl-rooms':   T('rooms'),
    'nav-lbl-events':  T('events'),
    'nav-lbl-chat':    T('chat'),
    'nav-lbl-profile': T('profile')
  };
  Object.keys(navMap).forEach(function(id){
    var el = document.getElementById(id);
    if (el) el.textContent = navMap[id];
  });
  /* new chat modal title */
  const sheetTitle = document.querySelector('.sheet-title');
  if (sheetTitle) sheetTitle.textContent = T('newChat');
  /* confirm dialog */
  const confirmTitle = document.querySelector('.confirm-title');
  if (confirmTitle) confirmTitle.textContent = T('deleteConfirmTitle');
  const confirmDelBtn = document.getElementById('confirmDelBtn');
  if (confirmDelBtn) confirmDelBtn.textContent = T('deleteConfirmBtn');
  const cancelBtn = document.querySelector('.confirm-btn.cancel');
  if (cancelBtn) cancelBtn.textContent = T('cancel');
  /* إعادة رسم القائمة بعد تغيير اللغة */
  if (allChats.length) renderChats(allChats);
}

/* ══ Auth ══ */
auth.onAuthStateChanged(user => {
  if (!user) { location.href='roomlogin.html'; return; }
  initNavDots(user.uid);
  myUid = user.uid;
  db.ref('users/'+myUid).once('value', snap => {
    const u = snap.val()||{};
    me = { uid:myUid, name:u.yourname||u.name||'أنا', avatar:u.avatar||'' };
    /* تطبيق اللغة المحفوظة */
    var lang = (u.preferences && u.preferences.lang) || u.lang || 'ar';
    applyLang(lang);
    loadChats();
  });
});

/* ══ تحميل المحادثات — Real-time ══ */
function loadChats() {
  db.ref('chats').orderByChild('participants/'+myUid).equalTo(true).on('value', snap => {
    allChats = [];
    snap.forEach(s => { const c=s.val(); if(c) allChats.push({id:s.key,...c}); });
    allChats.sort((a,b)=>(b.lastMessageTime||0)-(a.lastMessageTime||0));
    renderChats(allChats);
    document.getElementById('loader').style.display='none';
  });
}

/* ══ عرض المحادثات ══ */
function renderChats(chats) {
  const list = document.getElementById('chatList');
  const q = document.getElementById('searchInput').value.trim().toLowerCase();

  let filtered = chats.filter(c => {
    const isArchived = !!(c.archived && c.archived[myUid]);
    return currentTab === 'archive' ? isArchived : !isArchived;
  });

  if (q) {
    filtered = filtered.filter(c => {
      const uid = Object.keys(c.participants||{}).find(k=>k!==myUid)||'';
      const n = (c.participantDetails?.[uid]?.name||'').toLowerCase();
      return n.includes(q);
    });
  }

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <h3>${currentTab==='archive'?T('noArchive'):T('noChats')}</h3>
      <p>${currentTab==='archive'?T('noArchiveSub'):T('noChatsSub')}</p>
    </div>`;
    return;
  }

  const pinned = filtered.filter(c => c.pinned && c.pinned[myUid]);
  const normal  = filtered.filter(c => !(c.pinned && c.pinned[myUid]));

  let html = '';
  if (pinned.length && currentTab !== 'archive') {
    html += `<div class="pinned-divider"><svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>${T('pinned')}</div>`;
    pinned.forEach(c => { html += buildItem(c, true); });
  }
  normal.forEach(c => { html += buildItem(c, false); });
  list.innerHTML = html;
}

/* ══ بناء عنصر المحادثة مع Shimmer على الصورة ══ */
function buildItem(chat, isPinned) {
  const parts    = chat.participants||{};
  const uid2     = Object.keys(parts).find(k=>k!==myUid)||'';
  const other    = chat.participantDetails?.[uid2]||{};
  const name     = other.name||'مستخدم';

  /* ── الصورة الحقيقية أولاً، ثم جلبها من users/ إن لم تكن موجودة ── */
  const av       = other.avatar||'';
  const lastMsg  = chat.lastMessage||'';
  const lastTime = chat.lastMessageTime ? timeAgo(chat.lastMessageTime) : '';
  const unread   = chat.unread?.[myUid]||0;
  const online   = !!(chat.online?.[uid2]);
  const archived = !!(chat.archived?.[myUid]);

  /* أيقونة الدبوس */
  const pinSvg = `<svg viewBox="0 0 24 24" width="13" height="13" style="fill:var(--primary);flex-shrink:0;"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`;

  /* أيقونة نقاط ثلاث */
  const dotsSvg = `<svg viewBox="0 0 24 24" width="20" height="20" style="fill:var(--sub);">
    <circle cx="12" cy="5" r="1.3"/><circle cx="12" cy="12" r="1.3"/><circle cx="12" cy="19" r="1.3"/>
  </svg>`;

  /* الـ img src — إذا كانت الصورة فارغة سنجلبها من Firebase لاحقاً */
  const imgSrc = av || '';
  const itemId = 'ci_'+chat.id;

  return `<div class="chat-item${isPinned?' pinned-item':''}" id="${itemId}">
    <div class="chat-item-body" onclick="openChat('${chat.id}','${esc(name)}','${esc(av)}','${uid2}')">
      <div class="av-sk-wrap" id="avwrap_${uid2}">
        <div class="av-shimmer" id="avsk_${uid2}"></div>
        <img class="av" id="avimg_${uid2}"
          src="${esc(imgSrc)}"
          data-uid="${uid2}"
          data-name="${esc(name)}"
          onload="onAvLoad(this)"
          onerror="onAvError(this)">
        ${online?'<div class="online-dot"></div>':''}
      </div>
      <div class="chat-info">
        <div class="chat-top">
          <div class="chat-name-row">
            <span class="chat-name-txt">${esc(name)}</span>
            ${isPinned?pinSvg:''}
          </div>
          <span class="chat-time">${lastTime}</span>
        </div>
        <div class="chat-bottom">
          <span class="chat-preview-txt${unread>0?' bold':''}">${lastMsg?esc(lastMsg):`<i style="color:#bbb;font-style:italic;font-size:12px;">${T('startChat')}</i>`}</span>
          ${unread>0?`<span class="unread-badge">${unread>99?'99+':unread}</span>`:''}
        </div>
      </div>
    </div>
    <button class="chat-menu-btn" onclick="openCtxMenu(event,'${chat.id}','${esc(name)}',${isPinned},${archived})">${dotsSvg}</button>
  </div>`;
}

/* ══ معالجة تحميل صورة المستخدم ══ */
function onAvLoad(img) {
  /* الصورة تحملت بنجاح — أخفِ الـ shimmer وأظهر الصورة */
  img.classList.add('loaded');
  const sk = document.getElementById('avsk_'+img.dataset.uid);
  if (sk) sk.classList.add('done');
}

function onAvError(img) {
  const uid = img.dataset.uid;
  const name = img.dataset.name || 'U';
  /* لم تتوفر صورة محلية — اجلب من Firebase مباشرة */
  if (uid) {
    db.ref('users/'+uid+'/avatar').once('value', snap => {
      const url = snap.val();
      if (url) {
        img.src = url;
        /* onload سيتولى إخفاء الـ shimmer */
      } else {
        /* لا توجد صورة على الإطلاق — أخفِ الـ shimmer واعرض placeholder شفاف */
        img.src = 'https://ui-avatars.com/api/?name='+encodeURIComponent(name)+'&background=e0e0e0&color=888&size=108&bold=true';
        img.onload = null;
        img.classList.add('loaded');
        const sk = document.getElementById('avsk_'+uid);
        if (sk) sk.classList.add('done');
      }
    });
  } else {
    img.classList.add('loaded');
    const sk = document.getElementById('avsk_'+uid);
    if (sk) sk.classList.add('done');
  }
}

/* ══ قائمة السياق ══ */
function openCtxMenu(e, chatId, name, isPinned, isArchived) {
  e.stopPropagation();
  const menu = document.getElementById('ctxMenu');
  const ovl  = document.getElementById('ctxOverlay');

  /* SVG أيقونات */
  const pinSvg     = `<svg viewBox="0 0 24 24" style="fill:var(--primary);stroke:none;"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`;
  const unpinSvg   = `<svg viewBox="0 0 24 24" style="fill:none;stroke:var(--sub);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
  const archSvg    = `<svg viewBox="0 0 24 24" style="fill:none;stroke:#9c27b0;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><rect x="2" y="3" width="20" height="4" rx="1"/><path d="M4 7v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7"/><line x1="10" y1="12" x2="14" y2="12"/></svg>`;
  const unarchSvg  = `<svg viewBox="0 0 24 24" style="fill:none;stroke:#9c27b0;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>`;
  const delSvg     = `<svg viewBox="0 0 24 24" style="fill:none;stroke:var(--red);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;

  menu.innerHTML = `
    <div class="ctx-item" onclick="togglePin('${chatId}',${isPinned})">
      ${isPinned ? unpinSvg : pinSvg}
      <span style="color:${isPinned?'var(--sub)':'var(--primary)'};">${isPinned?T('unpin'):T('pin')}</span>
    </div>
    <div class="ctx-item" onclick="toggleArchive('${chatId}',${isArchived})">
      ${isArchived ? unarchSvg : archSvg}
      <span style="color:#9c27b0;">${isArchived?T('unarchive'):T('archive')}</span>
    </div>
    <div class="ctx-sep"></div>
    <div class="ctx-item danger" onclick="confirmDelete('${chatId}','${esc(name)}')">
      ${delSvg}${T('delete')}
    </div>`;

  /* موضع القائمة */
  const r = e.currentTarget.getBoundingClientRect();
  let top  = r.bottom + 4;
  let left = r.left - 200 + r.width;
  if (top + 160 > window.innerHeight) top = r.top - 164;
  if (left < 8) left = 8;
  menu.style.cssText = `display:block;top:${top}px;left:${left}px;`;
  ovl.style.display  = 'block';
}

function closeCtxMenu() {
  document.getElementById('ctxMenu').style.display = 'none';
  document.getElementById('ctxOverlay').style.display = 'none';
}

/* ── تثبيت ── */
function togglePin(chatId, isPinned) {
  closeCtxMenu();
  const ref = db.ref('chats/'+chatId+'/pinned/'+myUid);
  isPinned ? ref.remove() : ref.set(true);
  showToast(isPinned ? T('unpinnedToast') : T('pinnedToast'));
}

/* ── أرشفة ── */
function toggleArchive(chatId, isArchived) {
  closeCtxMenu();
  const ref = db.ref('chats/'+chatId+'/archived/'+myUid);
  isArchived ? ref.remove() : ref.set(true);
  showToast(isArchived ? T('unarchivedToast') : T('archivedToast'));
}

/* ── حذف ── */
function confirmDelete(chatId, name) {
  closeCtxMenu();
  document.getElementById('confirmDesc').innerHTML = _lang==='ar'
    ? `هل تريد حذف محادثتك مع <strong>${name}</strong>؟<br>لن يتمكن أحد من رؤيتها بعد الحذف.`
    : `Are you sure you want to delete your conversation with <strong>${name}</strong>?`;
  const btn = document.getElementById('confirmDelBtn');
  btn.onclick = () => { doDeleteChat(chatId); closeConfirm(); };
  document.getElementById('confirmOv').style.display = 'flex';
}

function closeConfirm() { document.getElementById('confirmOv').style.display='none'; }

function doDeleteChat(chatId) {
  db.ref('chats/'+chatId).remove();
  const el = document.getElementById('ci_'+chatId);
  if (el) { el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),320); }
  showToast(T('deletedToast'));
}

/* ══ التبويبات ══ */
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-all').classList.toggle('active', tab==='all');
  document.getElementById('tab-archive').classList.toggle('active', tab==='archive');
  renderChats(allChats);
}

/* ══ فتح محادثة ══ */
function openChat(chatId, name, av, otherUid) {
  db.ref('chats/'+chatId+'/unread/'+myUid).set(0);
  location.href=`chat.html?chatId=${chatId}&name=${encodeURIComponent(name)}&av=${encodeURIComponent(av)}&uid=${otherUid}`;
}

/* ══ بحث ══ */
function filterChats() { renderChats(allChats); }

/* ══ محادثة جديدة ══ */
function openNewChat() {
  document.getElementById('newChatModal').classList.add('open');
  const ul=document.getElementById('usersList');
  ul.innerHTML='<div style="text-align:center;padding:30px;color:var(--sub);"><div style="width:36px;height:36px;border:4px solid #e1e8ed;border-top-color:var(--primary);border-radius:50%;animation:sk 1s linear infinite;margin:0 auto 12px;"></div><p>'+T('loadingFriends')+'</p></div>';
  const friendUids=[], promises=[], loaded={};
  promises.push(db.ref('friends').orderByChild('user1').equalTo(myUid).once('value',snap=>{
    snap.forEach(s=>{const f=s.val();if(f.status==='accepted')friendUids.push(f.user2);});
  }));
  promises.push(db.ref('friends').orderByChild('user2').equalTo(myUid).once('value',snap=>{
    snap.forEach(s=>{const f=s.val();if(f.status==='accepted')friendUids.push(f.user1);});
  }));
  Promise.all(promises).then(()=>{
    if(!friendUids.length){
      ul.innerHTML=`<div style="text-align:center;padding:40px 20px;">
        <svg viewBox="0 0 24 24" width="56" height="56" fill="none" stroke="#ddd" stroke-width="1.5" style="display:block;margin:0 auto 14px;"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <p style="font-size:15px;font-weight:700;color:#aaa;margin-bottom:6px;">${T('noFriends')}</p>
        <p style="font-size:12px;color:#ccc;">${T('noFriendsSub')}</p>
      </div>`;
      return;
    }
    ul.innerHTML='';
    friendUids.forEach(uid=>{
      if(loaded[uid])return; loaded[uid]=true;
      db.ref('users/'+uid).once('value',s=>{
        const u=s.val();if(!u)return;
        const name=u.yourname||u.name||'مستخدم';
        const av=u.avatar||'';
        const div=document.createElement('div');
        div.className='user-row';
        div.style.cssText='display:flex;align-items:center;gap:12px;padding:11px 8px;border-radius:12px;cursor:pointer;transition:background .15s;';
        div.onclick=()=>startChat(uid,name,av);
        /* صورة المستخدم مع shimmer */
        div.innerHTML=`
          <div class="av-sk-wrap" style="width:46px;height:46px;flex-shrink:0;">
            <div class="av-shimmer" id="fravsk_${uid}"></div>
            <img style="position:absolute;inset:0;width:100%;height:100%;border-radius:50%;object-fit:cover;border:2px solid #e1e8ed;opacity:0;transition:opacity .25s;"
              src="${esc(av)}"
              data-uid="${uid}"
              data-name="${esc(name)}"
              onload="this.style.opacity='1';var sk=document.getElementById('fravsk_${uid}');if(sk)sk.classList.add('done');"
              onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=e0e0e0&color=888&size=92&bold=true';this.style.opacity='1';var sk=document.getElementById('fravsk_${uid}');if(sk)sk.classList.add('done');">
          </div>
          <div style="min-width:0;">
            <div class="user-row-name">${esc(name)}</div>
            <div class="user-row-sub">
              <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              ${T('friend')}
            </div>
          </div>`;
        ul.appendChild(div);
      });
    });
  });
}

function closeNewChat() { document.getElementById('newChatModal').classList.remove('open'); }

function startChat(uid2, name, av) {
  const chatId=[myUid,uid2].sort().join("_");
  const updates = {};
  updates["participants/"+myUid] = true;
  updates["participants/"+uid2]  = true;
  updates["participantDetails/"+myUid+"/name"]   = me.name;
  updates["participantDetails/"+myUid+"/avatar"] = me.avatar||"";
  updates["participantDetails/"+uid2+"/name"]    = name;
  updates["participantDetails/"+uid2+"/avatar"]  = av||"";
  db.ref("chats/"+chatId).once("value",snap=>{
    if(!snap.exists()){
      updates["lastMessage"]="";
      updates["lastMessageTime"]=firebase.database.ServerValue.TIMESTAMP;
      updates["unread/"+myUid]=0;
      updates["unread/"+uid2]=0;
    }
    db.ref("chats/"+chatId).update(updates,()=>{
      closeNewChat();
      location.href="chat.html?chatId="+chatId+"\&name="+encodeURIComponent(name)+"\&av="+encodeURIComponent(av)+"\&uid="+uid2;
    });
  });
}

/* ══ مساعدات ══ */
function timeAgo(ts){
  const d=(Date.now()-ts)/1000;
  if(_lang==='en'){
    if(d<60)return 'now';
    if(d<3600)return Math.floor(d/60)+'m';
    if(d<86400)return Math.floor(d/3600)+'h';
    if(d<604800)return Math.floor(d/86400)+'d';
    return new Date(ts).toLocaleDateString('en-US',{month:'numeric',day:'numeric',year:'numeric'});
  }
  if(d<60)return 'الآن';
  if(d<3600)return Math.floor(d/60)+' د';
  if(d<86400)return Math.floor(d/3600)+' س';
  if(d<604800)return Math.floor(d/86400)+' ي';
  return new Date(ts).toLocaleDateString('ar');
}
function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg){
  const t=document.getElementById('msg-toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

/* ── نقاط الشريط السفلي ── */
function initNavDots(uid){
  firebase.database().ref('chats').orderByChild('participants/'+uid).equalTo(true).on('value',s=>{
    let u=0; s.forEach(c=>{u+=(c.val().unread&&c.val().unread[uid])||0;});
    const dot=document.getElementById('msgsNavDot');
    if(dot)dot.style.display=u>0?'block':'none';
  });
  const ls=parseInt(localStorage.getItem('lastSeenEvents')||'0');
  firebase.database().ref('settings/events').orderByChild('ts').startAt(ls+1).on('value',s=>{
    const dot=document.getElementById('eventsNavDot');
    if(dot)dot.style.display=s.numChildren()>0?'block':'none';
  });
}
