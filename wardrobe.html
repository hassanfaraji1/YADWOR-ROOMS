<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حقيبة الأناقة - YADWOR</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#1877f2;--bg:#f0f2f5;--card:#fff;--txt:#050505;--sub:#65676b;--border:#e4e8f0;--gold:#f1c40f;--green:#42b72a;--red:#e41e3f;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--txt);padding-top:60px;padding-bottom:72px;min-height:100vh;}
#loader{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding:16px;padding-top:80px;}
.sk{background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;}
.sk-circle{border-radius:50%!important;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.top-navbar{position:fixed;top:0;left:0;right:0;height:60px;background:var(--card);display:flex;align-items:center;padding:0 14px;z-index:1000;box-shadow:0 1px 6px rgba(0,0,0,0.08);gap:8px;}
.nav-btn{background:none;border:none;cursor:pointer;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--txt);}
.nav-btn svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.nav-title{flex:1;text-align:center;font-size:17px;font-weight:800;}
.user-strip{background:linear-gradient(135deg,#0d47a1,#1565c0);padding:14px 16px;display:flex;align-items:center;gap:14px;color:white;}
.strip-av-wrap{position:relative;width:52px;height:52px;flex-shrink:0;}
.strip-av{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2.5px solid rgba(255,255,255,.6);}
.strip-frame{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:148%;height:148%;object-fit:contain;pointer-events:none;}
.strip-info{flex:1;min-width:0;}
.strip-name{font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.strip-sub{font-size:12px;opacity:.8;margin-top:2px;}
.strip-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:white;padding:7px 12px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif;white-space:nowrap;flex-shrink:0;}
.tabs-bar{display:flex;overflow-x:auto;scrollbar-width:none;background:var(--card);border-bottom:2px solid var(--border);position:sticky;top:60px;z-index:100;}
.tabs-bar::-webkit-scrollbar{display:none;}
.t-btn{flex-shrink:0;padding:12px 13px;font-size:12px;font-weight:700;color:var(--sub);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;font-family:'Tajawal',sans-serif;white-space:nowrap;transition:.15s;margin-bottom:-2px;}
.t-btn.active{color:var(--primary);border-bottom-color:var(--primary);}
.tab-section{display:none;padding:12px;}
.tab-section.active{display:block;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.empty-state{text-align:center;padding:50px 20px;color:#bbb;grid-column:1/-1;}
.empty-state .ei{font-size:52px;margin-bottom:12px;display:block;}
.empty-state p{font-size:14px;line-height:1.8;}
.empty-state a{color:var(--primary);font-weight:700;text-decoration:none;}
.items-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.item-card{background:var(--card);border-radius:16px;padding:14px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.06);border:2px solid var(--border);position:relative;overflow:hidden;transition:.2s;}
.item-card.is-active{border-color:var(--gold);background:linear-gradient(135deg,#fffde7,#fff8e1);}
.active-tag{position:absolute;top:0;right:0;background:var(--gold);color:#333;font-size:10px;font-weight:800;padding:4px 10px;border-radius:0 14px 0 12px;}
.prev-wrap{width:78px;height:78px;margin:0 auto 10px;position:relative;display:flex;align-items:center;justify-content:center;}
.prev-av{width:78px;height:78px;border-radius:50%;object-fit:cover;border:2px solid #eee;}
.prev-frame{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:148%;height:148%;object-fit:contain;pointer-events:none;}
.prev-cover{width:100%;height:60px;object-fit:cover;border-radius:10px;}
.prev-badge{width:64px;height:64px;border-radius:50%;object-fit:cover;}
.prev-emoji{font-size:46px;line-height:1.1;}
.item-name{font-size:12px;font-weight:700;color:var(--txt);margin-bottom:3px;}
.item-sub{font-size:10px;color:var(--sub);margin-bottom:8px;}
.equip-btn{width:100%;padding:8px;border:none;border-radius:10px;font-size:12px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;transition:.15s;}
.equip-btn:active{opacity:.8;transform:scale(.97);}
.equip-btn.btn-on{background:linear-gradient(135deg,#f1c40f,#e67e22);color:#222;}
.equip-btn.btn-off{background:var(--primary);color:white;}
.equip-btn.btn-cancel{background:#f0f2f5;color:#666;border:1px solid #ddd;}
.leg-list{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.leg-card{background:var(--card);border-radius:16px;padding:12px;text-align:center;border:2px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,0.05);position:relative;transition:.2s;display:flex;flex-direction:column;align-items:center;}
.leg-card.is-active{border-color:var(--gold);background:linear-gradient(135deg,#fffde7,#fff8e1);}
.leg-icon{font-size:44px;flex-shrink:0;line-height:1;margin-bottom:8px;}
.leg-info{flex:1;min-width:0;width:100%;}
.leg-name{font-size:12px;font-weight:800;margin-bottom:4px;}
.leg-desc{font-size:10px;color:var(--sub);line-height:1.5;margin-bottom:8px;}
.leg-btn{width:100%;padding:8px 6px;border:none;border-radius:10px;font-size:11px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;}
.leg-btn:active{opacity:.8;}
.leg-btn.btn-on{background:linear-gradient(135deg,#f1c40f,#e67e22);color:#222;}
.leg-btn.btn-off{background:var(--primary);color:white;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--card);display:flex;justify-content:space-around;align-items:center;border-top:1px solid var(--border);z-index:1000;}
.nav-item{display:flex;flex-direction:column;align-items:center;justify-content:center;color:#90949c;font-size:10px;gap:3px;flex:1;height:100%;cursor:pointer;border:none;background:none;font-family:'Tajawal',sans-serif;}
.nav-item svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.nav-item.active{color:var(--primary);}
.nav-item.active svg{stroke:var(--primary);}
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a2e;color:white;padding:11px 24px;border-radius:22px;font-size:13px;font-weight:700;z-index:5000;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="loader">
  <div style="width:100%;max-width:500px;display:flex;flex-direction:column;gap:12px;">
    <div style="background:var(--card);border-radius:12px;padding:14px;display:flex;gap:12px;align-items:center;">
      <div class="sk sk-circle" style="width:52px;height:52px;flex-shrink:0;"></div>
      <div style="flex:1;display:flex;flex-direction:column;gap:8px;"><div class="sk" style="height:14px;width:50%;"></div><div class="sk" style="height:11px;width:35%;"></div></div>
    </div>
    <div class="sk" style="height:42px;border-radius:10px;"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="sk" style="height:165px;border-radius:14px;"></div><div class="sk" style="height:165px;border-radius:14px;"></div>
      <div class="sk" style="height:165px;border-radius:14px;"></div><div class="sk" style="height:165px;border-radius:14px;"></div>
    </div>
  </div>
</div>

<header class="top-navbar">
  <button class="nav-btn" onclick="history.back()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
  <span class="nav-title">حقيبة الأناقة</span>
  <button class="nav-btn" onclick="location.href='store.html'"><svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></button>
</header>

<div class="user-strip">
  <div class="strip-av-wrap">
    <img class="strip-av" id="stripAv" src="https://ui-avatars.com/api/?name=U" onerror="this.src='https://ui-avatars.com/api/?name=U'">
    <img class="strip-frame" id="stripFrame" src="" style="display:none;">
  </div>
  <div class="strip-info">
    <div class="strip-name" id="stripName">جاري التحميل...</div>
    <div class="strip-sub" id="stripSub">0 عنصر في حقيبتك</div>
  </div>
  <button class="strip-btn" onclick="location.href='store.html'">المتجر</button>
</div>

<div class="tabs-bar">
  <button class="t-btn active" id="tb_frames"      onclick="switchTab('frames')">إطارات</button>
  <button class="t-btn"        id="tb_covers"       onclick="switchTab('covers')">غلاف الملف</button>
  <button class="t-btn"        id="tb_bSupport"     onclick="switchTab('bSupport')">شارة الدعم</button>
  <button class="t-btn"        id="tb_bRooms"       onclick="switchTab('bRooms')">شارة الغرف</button>
  <button class="t-btn"        id="tb_nameTag"      onclick="switchTab('nameTag')">شارة الاسم</button>

</div>

<div class="tab-section active" id="sec_frames"><div class="items-grid" id="gFrames"></div></div>
<div class="tab-section"        id="sec_covers"><div class="items-grid" id="gCovers"></div></div>
<div class="tab-section"        id="sec_bSupport"><div class="items-grid" id="gBSupport"></div></div>
<div class="tab-section"        id="sec_bRooms"><div class="items-grid" id="gBRooms"></div></div>
<div class="tab-section"        id="sec_nameTag"><div class="items-grid" id="gNameTag"></div></div>
<div class="tab-section"        id="sec_titles"><div class="leg-list" id="gTitles"></div></div>
<div class="tab-section"        id="sec_legendary"><div class="leg-list" id="gLegendary"></div></div>
<div class="tab-section"        id="sec_entry"><div class="items-grid" id="gEntry"></div></div>

<div class="toast" id="toast"></div>

<nav class="bottom-nav">
  <button class="nav-item" onclick="location.href='index.html'"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>الرئيسية</span></button>
  <button class="nav-item" onclick="location.href='search.html'"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><span>بحث</span></button>
  <button class="nav-item" onclick="location.href='roomhom.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg><span>غرف</span></button>
  <button class="nav-item" onclick="location.href='events.html'"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>أحداث</span></button>
  <button class="nav-item" onclick="location.href='messages.html'"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>دردشة</span></button>
  <button class="nav-item active" onclick="location.href='profile.html'"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>ملفي</span></button>
</nav>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyAP-xRJ5zvHvMmqkkVvXnWdqwfuuj58CcA",authDomain:"a-comment-5a3e5.firebaseapp.com",databaseURL:"https://a-comment-5a3e5-default-rtdb.firebaseio.com",projectId:"a-comment-5a3e5",storageBucket:"a-comment-5a3e5.appspot.com",messagingSenderId:"557343451166",appId:"1:557343451166:web:d181f098cdeccf7691260f"});
const db=firebase.database(),auth=firebase.auth();
let myUid=null,myData={};
const loaded=new Set();
const TABS=['frames','covers','bSupport','bRooms','nameTag','titles','legendary','entry'];

auth.onAuthStateChanged(async user=>{
  if(!user){location.href='roomlogin.html';return;}
    initNavDots(user.uid);
  myUid=user.uid;
  const snap=await db.ref('users/'+myUid).once('value');
  myData=snap.val()||{};
  await checkAndRemoveExpiredRewards();
  renderStrip();
  document.getElementById('loader').style.display='none';
  doLoad('frames');
});

async function checkAndRemoveExpiredRewards(){
  const now=Date.now();
  const sections=['ownedFrames','ownedCovers','ownedBadges','ownedTitles','ownedEntryEffects','ownedNameBadges'];
  const updates={};
  const expired=[];
  sections.forEach(sec=>{
    const owned=myData[sec]||{};
    Object.keys(owned).forEach(key=>{
      const item=owned[key]||{};
      if(item.expiresAt&&now>item.expiresAt){
        updates[sec+'/'+key]=null;
        expired.push(item.name||'عنصر');
        delete myData[sec][key];
      }
    });
  });
  if(Object.keys(updates).length>0){
    await db.ref('users/'+myUid).update(updates);
    // إرسال إشعار لكل عنصر منتهٍ
    expired.forEach(name=>{
      const notifKey=db.ref('notifications/'+myUid).push().key;
      db.ref('notifications/'+myUid+'/'+notifKey).set({
        type:'reward_expired',
        title:'انتهت صلاحية مكافأة',
        body:'انتهت فترة '+name+' وتمت إزالتها من حقيبتك',
        ts:now,
        read:false
      });
    });
  }
}

// ── مساعد عرض وقت انتهاء الصلاحية ──
function expiryLabel(expiresAt){
  if(!expiresAt) return '<div style="font-size:10px;color:#22c55e;font-weight:700;margin-top:4px;background:rgba(34,197,94,0.08);padding:2px 8px;border-radius:6px;text-align:center;">دائم</div>';
  const diff=expiresAt-Date.now();
  if(diff<=0) return '<div style="font-size:10px;color:#ef4444;font-weight:700;margin-top:4px;background:rgba(239,68,68,0.08);padding:2px 8px;border-radius:6px;text-align:center;">منتهي</div>';
  const d=Math.floor(diff/86400000);
  const h=Math.floor((diff%86400000)/3600000);
  const m=Math.floor((diff%3600000)/60000);
  let txt='';
  if(d>0) txt=d+'ي '+h+'س';
  else if(h>0) txt=h+'س '+m+'د';
  else txt=m+' دقيقة';
  const color=diff<86400000?'#f97316':diff<259200000?'#eab308':'#60a5fa';
  const bg=diff<86400000?'rgba(249,115,22,0.08)':diff<259200000?'rgba(234,179,8,0.08)':'rgba(96,165,250,0.08)';
  return `<div style="font-size:10px;color:${color};font-weight:700;margin-top:4px;background:${bg};padding:2px 8px;border-radius:6px;text-align:center;">⏱ ${txt}</div>`;
}

function renderStrip(){
  const av=myData.avatar||'https://ui-avatars.com/api/?name=U';
  document.getElementById('stripAv').src=av;
  document.getElementById('stripName').textContent=myData.yourname||myData.name||'مستخدم';
  const frUrl=myData.activeFrameUrl||'';
  const frEl=document.getElementById('stripFrame');
  if(frEl&&frUrl){frEl.src=frUrl;frEl.style.display='block';}
  let total=0;
  ['ownedFrames','ownedCovers','ownedBadges','ownedTitles','ownedEntryEffects','ownedNameBadges'].forEach(k=>{if(myData[k])total+=Object.keys(myData[k]).length;});
  document.getElementById('stripSub').textContent=total+' عنصر في حقيبتك';
}

function switchTab(tab){
  TABS.forEach(id=>{
    document.getElementById('tb_'+id).classList.toggle('active',id===tab);
    document.getElementById('sec_'+id).classList.toggle('active',id===tab);
  });
  doLoad(tab);
}
function doLoad(tab){if(loaded.has(tab))return;loaded.add(tab);if(tab==='frames')loadFrames();else if(tab==='covers')loadCovers();else if(tab==='bSupport')loadBadge('support');else if(tab==='bRooms')loadBadge('rooms');else if(tab==='nameTag')loadNameTag();else if(tab==='titles')loadTitles();else if(tab==='legendary')loadLegendary();else if(tab==='entry')loadEntryEffects();}
function reload(tab){loaded.delete(tab);doLoad(tab);}

// ── ENTRY EFFECTS (تأثير الدخول) ──
async function loadEntryEffects(){
  const c=document.getElementById('gEntry');
  const owned=myData.ownedEntryEffects||{};
  const keys=Object.keys(owned);
  if(!keys.length){c.innerHTML=empty('✨','لا توجد تأثيرات دخول في حقيبتك','events.html','اكتسب تأثيرات');return;}
  const activeEntry=myData.activeEntryUrl||'';
  c.innerHTML=keys.map(key=>{
    const item=owned[key]||{};
    const imgUrl=item.imgUrl||'';
    const name=item.name||'تأثير دخول';
    const isA=!!(activeEntry&&imgUrl&&activeEntry===imgUrl);
    return `<div class="item-card ${isA?'is-active':''}">
      ${isA?'<div class="active-tag">✦ مفعّل</div>':''}
      <div class="prev-wrap" style="background:#f5f0ff;border-radius:12px;overflow:hidden;">
        ${imgUrl?`<img src="${esc(imgUrl)}" style="width:100%;height:100%;object-fit:contain;" onerror="this.style.display='none'">`:'<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:36px;">✨</div>'}
      </div>
      <div class="item-name">${esc(name)}</div>
      ${expiryLabel(item.expiresAt||null)}
      <div class="item-sub">${item.source==='task'?'من مهمة':(item.source==='leaderboard'?'من تصنيف':'تأثير مكتسب')}</div>
      <button class="equip-btn ${isA?'btn-cancel':'btn-off'}" onclick="toggleEntryEffect('${key}','${esc(imgUrl)}')">
        ${isA?'إلغاء التفعيل':'تفعيل'}
      </button>
    </div>`;
  }).join('');
}
async function toggleEntryEffect(key,imgUrl){
  const isA=!!(myData.activeEntryUrl&&imgUrl&&myData.activeEntryUrl===imgUrl);
  if(isA){
    await db.ref('users/'+myUid).update({activeEntryUrl:''});
    myData.activeEntryUrl='';
    showToast('تم إلغاء تفعيل تأثير الدخول');
  }else{
    await db.ref('users/'+myUid).update({activeEntryUrl:imgUrl});
    myData.activeEntryUrl=imgUrl;
    showToast('تم تفعيل تأثير الدخول');
  }
  reload('entry');
}

// ── FRAMES ──
async function loadFrames(){
  const c=document.getElementById('gFrames');
  const owned=myData.ownedFrames||{};
  const keys=Object.keys(owned);
  if(!keys.length){c.innerHTML=empty('🖼️','لا توجد إطارات في حقيبتك','store.html','تصفح المتجر');return;}
  c.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:20px;color:#aaa;">...</div>';
  const snap=await db.ref('settings/frames').once('value');
  const all=snap.val()||{};
  const active=myData.activeFrame||'';
  const av=myData.avatar||'https://ui-avatars.com/api/?name=U';
  c.innerHTML=keys.map(key=>{
    // الإطارات من المتجر لها key في settings/frames، والإطارات من المهام لها imgUrl مباشرة
    const stored=owned[key]||{};
    const f=all[key]||{};
    const frameImgUrl=stored.imgUrl||f.imgUrl||'';
    const frameName=stored.name||f.name||'إطار';
    const isA=active===key;
    return `<div class="item-card ${isA?'is-active':''}">
      ${isA?'<div class="active-tag">✦ مفعّل</div>':''}
      <div class="prev-wrap">
        <img src="${esc(av)}" class="prev-av" onerror="this.src='https://ui-avatars.com/api/?name=U'">
        ${frameImgUrl?`<img src="${esc(frameImgUrl)}" class="prev-frame" onerror="this.remove()">`:''}
      </div>
      <div class="item-name">${esc(frameName)}</div>
      ${expiryLabel(stored.expiresAt||null)}
      <div class="item-sub">${isA?'مفعّل حالياً':'غير مفعّل'}</div>

async function loadBadge(cat){
  const gid=cat==='support'?'gBSupport':'gBRooms';
  const c=document.getElementById(gid);
  const owned=myData.ownedBadges||{};
  c.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:20px;color:#aaa;">...</div>';
  const snap=await db.ref('settings/badges').once('value');
  const all=snap.val()||{};
  // شارات المتجر: موجودة في settings/badges ومملوكة
  const catList=Object.entries(all).filter(([k,b])=>{
    if(!owned[k])return false;
    const bc=b.category||b.type||'';
    return cat==='support'?(bc==='support'||bc==='دعم'||bc==='دعم الغرف'):(bc==='rooms'||bc==='غرف'||bc==='نشاط الغرف');
  });
  // شارات المهام: موجودة في ownedBadges فقط (ليست في settings/badges)
  const taskBadgeList=Object.entries(owned).filter(([k,b])=>{
    if(all[k])return false; // موجودة في المتجر تجاهل (تُعرض أعلاه)
    if(!b||!b.imgUrl)return false;
    const bc=b.category||b.type||'';
    return cat==='support'?(bc==='support'||bc==='دعم'||bc==='دعم الغرف'):(bc==='rooms'||bc==='غرف'||bc==='نشاط الغرف'||bc==='rooms-audio');
  });
  const fullList=[...catList.map(([k,b])=>([k,{...b,...(owned[k]||{})}])),...taskBadgeList.map(([k,b])=>([k,b]))];
  if(!fullList.length){c.innerHTML=empty(cat==='support'?'🏅':'🎙️','لا توجد شارات '+(cat==='support'?'دعم':'غرف')+' في حقيبتك','events.html','اكتسب شارات');return;}
  const activeKey=cat==='support'?(myData.activeBadgeSupport||''):(myData.activeBadgeRooms||'');
  c.innerHTML=fullList.map(([key,b])=>{
    const isA=activeKey===key;
    const imgH=b.imgUrl?`<img src="${esc(b.imgUrl)}" class="prev-badge" onerror="this.remove()">`:`<div class="prev-emoji">${b.icon||'⭐'}</div>`;
    // تحديد نوع شارة الغرفة لعرض label
    const bc=b.category||b.type||'';
    let roomLabel='';
    if(cat==='rooms'){
      if(bc==='rooms-audio'||bc==='غرف صوتية'||b.roomType==='audio') roomLabel='<div style="font-size:10px;font-weight:800;color:#7c3aed;background:rgba(124,58,237,0.1);border-radius:6px;padding:2px 7px;margin-bottom:4px;text-align:center;">غرفة صوتية</div>';
      else roomLabel='<div style="font-size:10px;font-weight:800;color:#0369a1;background:rgba(3,105,161,0.1);border-radius:6px;padding:2px 7px;margin-bottom:4px;text-align:center;">غرفة فيديو</div>';
    }
    return `<div class="item-card ${isA?'is-active':''}">
      ${isA?'<div class="active-tag">✦ مفعّل</div>':''}
      <div class="prev-wrap">${imgH}</div>
      ${roomLabel}
      <div class="item-name">${esc(b.name||'شارة')}</div>
      ${expiryLabel(owned[key]?.expiresAt||null)}
      <div class="item-sub">${isA?'مفعّل حالياً':'غير مفعّل'}</div>
      <button class="equip-btn ${isA?'btn-cancel':'btn-off'}" onclick="toggleBadge('${key}','${cat}','${esc(b.imgUrl||'')}','${esc(b.name||'')}')">
        ${isA?'⊘ إلغاء التفعيل':'▶ تفعيل'}
      </button>
    </div>`;
  }).join('');
}
async function toggleBadge(key,cat,imgUrl,name){
  const f=cat==='support'?'activeBadgeSupport':'activeBadgeRooms';

async function toggleTitleImg(key,imgUrl,type,extraData){
  const f=type==='legendary'?'activeLegendaryTitle':'activeTitle';
  const fUrl=type==='legendary'?'activeLegendaryTitleUrl':'activeTitleUrl';
  const was=(myData[f]||'')===key;
  if(was){
    const clr={[f]:'', [fUrl]:''};
    if(type==='legendary'){clr.activeLegendaryTitleName='';clr.activeLegendaryTitleBg='';clr.activeLegendaryTitleColor='';clr.activeLegendaryTitleDesc='';}
    await db.ref('users/'+myUid).update(clr);
    myData[f]='';myData[fUrl]='';
    showToast('تم إلغاء تفعيل اللقب');
  } else {
    const upd={[f]:key,[fUrl]:imgUrl};
    if(type==='legendary'&&extraData){
      if(extraData.name)  upd.activeLegendaryTitleName  = extraData.name;
      if(extraData.bg)    upd.activeLegendaryTitleBg    = extraData.bg;
      if(extraData.color) upd.activeLegendaryTitleColor = extraData.color;
      if(extraData.desc)  upd.activeLegendaryTitleDesc  = extraData.desc;
    }
    await db.ref('users/'+myUid).update(upd);
    myData[f]=key;myData[fUrl]=imgUrl;
    showToast(type==='legendary'?'👑 تم تفعيل اللقب الأسطوري!':'✦ تم تفعيل اللقب!');
  }
  reload(type==='legendary'?'legendary':'titles');
}
async function toggleTitle(key,type){
  const f=type==='legendary'?'activeLegendaryTitle':'activeTitle';
  const was=(myData[f]||'')===key;
  if(was){await db.ref('users/'+myUid).update({[f]:''});myData[f]='';showToast('تم إلغاء تفعيل اللقب');}
  else{await db.ref('users/'+myUid).update({[f]:key});myData[f]=key;showToast(type==='legendary'?'👑 تم تفعيل اللقب الأسطوري!':'✦ تم تفعيل اللقب!');}
  reload(type==='legendary'?'legendary':'titles');
}
// ── تفعيل لا محدود من الألقاب ──
async function toggleTitleMulti(key,imgUrl){
  const activeTitles = myData.activeTitles ? [...myData.activeTitles] : (myData.activeTitle ? [myData.activeTitle] : []);
  const activeTitleUrls = myData.activeTitleUrls ? {...myData.activeTitleUrls} : (myData.activeTitleUrl ? {[myData.activeTitle||key]: myData.activeTitleUrl} : {});
  const idx = activeTitles.indexOf(key);
  if(idx !== -1){
    activeTitles.splice(idx,1);
    delete activeTitleUrls[key];
    showToast('تم إلغاء تفعيل اللقب');
  } else {
    activeTitles.push(key);
    if(imgUrl) activeTitleUrls[key] = imgUrl;
    showToast('✦ تم تفعيل اللقب!');
  }
  myData.activeTitles = activeTitles;
  myData.activeTitleUrls = activeTitleUrls;
  await db.ref('users/'+myUid).update({activeTitles, activeTitleUrls});
  reload('titles');
}

// ── LEGENDARY ──
async function loadLegendary(){
  const c=document.getElementById('gLegendary');
  const owned=myData.ownedTitles||{};
  const keys=Object.keys(owned);
  if(!keys.length){c.innerHTML=empty('👑','لا توجد ألقاب أسطورية في حقيبتك','events.html','ابدأ رحلتك');return;}
  c.innerHTML='<div style="text-align:center;padding:20px;color:#aaa;">...</div>';
  const snap=await db.ref('settings/titles').once('value');
  const all=snap.val()||{};
  // الألقاب الأسطورية: إما من settings أو من المهام بـ source=task وليست legendary في settings
  const leg=keys.filter(k=>{
    const stored=owned[k]||{};
    const fromSettings=all[k]||{};
    // إذا كان من مهمة (bigTitle) سنميّزه بـ bigTitle=true
    if(stored.bigTitle===true&&stored.imgUrl) return true;
    return fromSettings.type==='legendary';
  });
  if(!leg.length){c.innerHTML=empty('👑','لا توجد ألقاب أسطورية في حقيبتك','events.html','ابدأ رحلتك الأسطورية');return;}
  const active=myData.activeLegendaryTitle||'';
  c.innerHTML=leg.map(key=>{
    const stored=owned[key]||{};
    const t=all[key]||{};const isA=active===key;
    if(stored.bigTitle===true&&stored.imgUrl){
      return `<div class="leg-card ${isA?'is-active':''}"
        data-key="${esc(key)}"
        data-img="${esc(stored.imgUrl)}"
        data-name="${esc(stored.name||'')}"
        data-bg="${esc(stored.bg||'')}"

        data-desc="${esc(stored.desc||'')}">
        ${isA?'<div class="active-tag">✦ مفعّل</div>':''}
        <div class="leg-icon"><img src="${esc(stored.imgUrl)}" style="width:64px;height:64px;object-fit:contain;" onerror="this.style.display='none'"></div>
        <div class="leg-info">
          <div class="leg-name" style="color:#e67e22;">${esc(stored.name||'لقب أسطوري')}</div>
          <div class="leg-desc">لقب أسطوري من مهمة</div>
          ${expiryLabel(stored.expiresAt||null)}
          <button class="leg-btn ${isA?'btn-on':'btn-off'} leg-activate-btn">
            ${isA?'⊘ إلغاء التفعيل':'▶ تفعيل'}
          </button>
        </div>
      </div>`;
    }
    return `<div class="leg-card ${isA?'is-active':''}" data-key="${esc(key)}" data-type="settings">
      ${isA?'<div class="active-tag">✦ مفعّل</div>':''}
      <div class="leg-icon" style="font-size:48px;">${t.icon||'👑'}</div>
      <div class="leg-info">
        <div class="leg-name" style="color:${t.color||'#e67e22'};">${esc(t.name||'لقب أسطوري')}</div>
        <div class="leg-desc">${esc(t.desc||t.challenge||'لقب نادر وحصري')}</div>
        ${expiryLabel(stored.expiresAt||null)}
        <button class="leg-btn ${isA?'btn-on':'btn-off'} leg-settings-btn">
          ${isA?'⊘ إلغاء التفعيل':'▶ تفعيل'}
        </button>
      </div>
    </div>`;
  }).join('');

  // ربط أحداث الأزرار بعد رسم الـ HTML
  c.querySelectorAll('.leg-activate-btn').forEach(btn=>{
    btn.addEventListener('click', function(){
      const card=this.closest('.leg-card');
      const k   = card.dataset.key;
      const img = card.dataset.img;
      const extra={name:card.dataset.name,bg:card.dataset.bg,color:card.dataset.color,desc:card.dataset.desc};
      toggleTitleImg(k, img, 'legendary', extra);
    });
  });
  c.querySelectorAll('.leg-settings-btn').forEach(btn=>{
    btn.addEventListener('click', function(){
      const card=this.closest('.leg-card');
      toggleTitle(card.dataset.key,'legendary');
    });
  });
} // ── نهاية loadLegendary ──

function empty(icon,msg,href,label){return `<div class="empty-state" style="grid-column:1/-1;"><span class="ei">${icon}</span><p>${msg}<br><a href="${href}">${label} ←</a></p></div>`;}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function esc(t){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── نقاط الإشعار في الشريط السفلي ──
function initNavDots(uid) {
    const db2 = firebase.database();
    // رسائل غير مقروءة
    db2.ref('chats').orderByChild('participants/'+uid).equalTo(true).on('value', s => {
        let unread = 0;
        s.forEach(c => { unread += (c.val().unread && c.val().unread[uid]) || 0; });
        const dot = document.getElementById('msgsNavDot');
        if (dot) dot.style.display = unread > 0 ? 'block' : 'none';
    });
    // أحداث جديدة
    const lastSeen = parseInt(localStorage.getItem('lastSeenEvents') || '0');
    db2.ref('settings/events').orderByChild('ts').startAt(lastSeen + 1).on('value', s => {
        const dot = document.getElementById('eventsNavDot');
        if (dot) dot.style.display = s.numChildren() > 0 ? 'block' : 'none';
    });
}
