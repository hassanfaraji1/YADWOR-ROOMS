<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الأنشطة والمهام</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root{--primary:#1877f2;--card:#fff;--border:#eee;--red:#e41e3f;--sub:#65676b;}
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(160deg, #0d1520 0%, #0a1018 50%, #0c1219 100%); min-height: 100vh; padding-bottom: 80px; }
        /* ─── Bottom nav ─── */
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;height:60px;background:#111118;display:flex;justify-content:space-around;align-items:center;border-top:1px solid rgba(100,150,255,0.1);z-index:1000;}
        .nav-item{display:flex;flex-direction:column;align-items:center;justify-content:center;color:#90949c;font-size:10px;gap:3px;flex:1;height:100%;cursor:pointer;border:none;background:none;font-family:'Tajawal',sans-serif;position:relative;}
        .nav-item svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
        .nav-item.active{color:#4a90e2;}
        .nav-item.active svg{stroke:#4a90e2;}
        .nav-item span{color:inherit;}
        .header { background: rgba(10, 10, 15, 0.98); padding: 12px 20px; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; backdrop-filter: blur(15px); border-bottom: 1px solid rgba(100, 150, 255, 0.08); }
        .header-title { font-size: 18px; font-weight: 800; color: #fff; text-align: center; margin-bottom: 12px; }
        .sub-tabs { background: rgba(100, 150, 255, 0.03); padding: 8px; border-radius: 15px; display: flex; gap: 6px; overflow-x: auto; border: 1px solid rgba(100, 150, 255, 0.06); }
        .sub-tabs::-webkit-scrollbar { display: none; }
        .sub-tab { padding: 8px 14px; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(100, 150, 255, 0.08); border-radius: 12px; color: rgba(255, 255, 255, 0.5); font-weight: 700; font-size: 12px; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 5px; transition: all 0.3s ease; }
        .sub-tab svg { width: 16px; height: 16px; fill: currentColor; }
        .sub-tab.active { background: linear-gradient(135deg, #1a237e 0%, #283593 100%); color: #fff; border-color: rgba(100, 150, 255, 0.2); }
        .period-info { background: rgba(100, 150, 255, 0.05); padding: 8px 12px; border-radius: 10px; font-size: 11px; text-align: center; color: rgba(255, 255, 255, 0.5); margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 6px; border: 1px solid rgba(100, 150, 255, 0.08); }
        .period-info svg { width: 14px; height: 14px; fill: currentColor; }
        .tab-content { display: none; padding: 12px; margin-top: 140px; animation: fadeIn 0.3s ease; padding-bottom: 80px; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .task-card { background: linear-gradient(135deg, rgba(18,32,70,0.6) 0%, rgba(10,18,45,0.65) 100%); border-radius: 14px; padding: 12px 13px; margin-bottom: 9px; border: 1px solid rgba(80,120,220,0.14); backdrop-filter: blur(8px); }
        .task-card.is-completed { background: linear-gradient(135deg, rgba(14,18,28,0.82) 0%, rgba(10,13,20,0.88) 100%); border-color: rgba(255,255,255,0.06); }
        .task-card.is-claimed { background: linear-gradient(135deg, rgba(14,18,28,0.82) 0%, rgba(10,13,20,0.88) 100%); border-color: rgba(255,193,7,0.12); }
        .task-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .task-icon { width: 38px; height: 38px; background: linear-gradient(135deg, #1a3a7e 0%, #2a4aaa 100%); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .task-icon svg { width: 20px; height: 20px; fill: #fff; }
        .task-title h3 { color: #fff; font-size: 13px; margin-bottom: 2px; font-weight: 800; }
        .task-title p { color: rgba(255, 255, 255, 0.4); font-size: 10px; }
        .task-reward { display:none; }
        .task-reward-imgs { display:none; }
        .task-progress { background: rgba(255, 255, 255, 0.07); height: 5px; border-radius: 3px; margin: 8px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #FFC107 0%, #FFD700 100%); border-radius: 3px; transition: width 0.5s ease; }
        .task-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
        .task-status { font-size: 11px; color: rgba(255, 255, 255, 0.4); font-weight: 600; }
        .btn-claim { background: linear-gradient(135deg, #1e4db7 0%, #2855c8 100%); color: #fff; border: none; padding: 7px 18px; border-radius: 9px; font-weight: 700; cursor: pointer; font-size: 11px; font-family: 'Tajawal', sans-serif; }
        .btn-claim:disabled { background: rgba(255, 255, 255, 0.08); cursor: not-allowed; color: rgba(255,255,255,0.35); }

        /* ===== صور مكافآت المهمة ===== */
        .task-reward-imgs { margin: 10px 0; }
        .reward-imgs-label { font-size: 10px; color: rgba(255,255,255,0.35); display: block; margin-bottom: 7px; font-weight: 600; }
        .reward-imgs-row { display: flex; flex-wrap: wrap; gap: 7px; }
        .reward-img-chip { display: flex; align-items: center; gap: 5px; background: rgba(100,150,255,0.08); border: 1px solid rgba(100,150,255,0.15); border-radius: 10px; padding: 5px 9px; cursor: pointer; transition: all 0.25s; }
        .reward-img-chip:hover { background: rgba(100,150,255,0.18); border-color: rgba(100,150,255,0.35); transform: scale(1.04); }
        .reward-img-chip img { width: 28px; height: 28px; object-fit: contain; border-radius: 6px; background: rgba(255,255,255,0.05); }
        .reward-img-chip span { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.75); white-space: nowrap; }
        .leaderboard-fixed-section { background: linear-gradient(135deg, rgba(20,35,80,0.5) 0%, rgba(10,20,50,0.55) 100%); border-radius: 16px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(100, 150, 255, 0.1); backdrop-filter: blur(8px); }
        .leaderboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .leaderboard-title { color: #fff; font-size: 16px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .leaderboard-title svg { width: 20px; height: 20px; fill: #FFC107; }
        .btn-rewards { background: linear-gradient(135deg, #b45309 0%, #d97706 100%); color: #fff; border: none; padding: 8px 16px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 11px; display: flex; align-items: center; gap: 5px; font-family: 'Tajawal', sans-serif; box-shadow: 0 3px 12px rgba(180,83,9,0.4); }
        .btn-rewards svg { width: 16px; height: 16px; fill: #fff; }
        .top-three { display: flex; justify-content: center; align-items: flex-end; gap: 8px; margin-bottom: 20px; padding: 16px; background: rgba(100, 150, 255, 0.03); border-radius: 16px; border: 1px solid rgba(100, 150, 255, 0.06); }
        .top-player { text-align: center; flex: 1; position: relative; }
        .top-player.second { order: 1; transform: translateY(12px); }
        .top-player.first { order: 2; transform: translateY(0); }
        .top-player.third { order: 3; transform: translateY(12px); }
        .rank-badge { position: absolute; top: -8px; left: 50%; transform: translateX(-50%); width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; z-index: 10; }
        .top-player.first .rank-badge { width: 35px; height: 35px; font-size: 18px; background: linear-gradient(135deg, #FFC107 0%, #FFA000 100%); color: #000; top: -12px; }
        .top-player.second .rank-badge { background: linear-gradient(135deg, #9E9E9E 0%, #757575 100%); color: #fff; }
        .top-player.third .rank-badge { background: linear-gradient(135deg, #8D6E63 0%, #6D4C41 100%); color: #fff; }
        .player-avatar { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #1a237e 0%, #283593 100%); margin: 15px auto 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 2px solid rgba(100, 150, 255, 0.15); color: #fff; font-weight: 700; overflow: hidden; position: relative; }
        /* ── Facebook Shimmer للصور ── */
        .av-shimmer { position: absolute; inset: 0; border-radius: inherit; background: linear-gradient(90deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.13) 40%, rgba(255,255,255,0.04) 80%); background-size: 200% 100%; animation: avShimmer 1.4s infinite; z-index: 2; pointer-events: none; }
        @keyframes avShimmer { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }
        .av-shimmer.hidden { display: none; }
        .av-img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.3s; position: relative; z-index: 1; }
        .av-img.loaded { opacity: 1; }
        .player-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .top-player.first .player-avatar { width: 75px; height: 75px; font-size: 28px; border: 3px solid #FFC107; }
        .crown { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); width: 30px; height: 30px; }
        .crown svg { width: 100%; height: 100%; fill: #FFC107; }
        .player-name { font-weight: 700; color: #fff; font-size: 11px; margin-bottom: 4px; }
        .player-points { color: #FFC107; font-weight: 700; font-size: 10px; }
        .leaderboard-scroll-section { background: rgba(100, 150, 255, 0.02); border-radius: 16px; padding: 12px; border: 1px solid rgba(100, 150, 255, 0.06); }
        .leaderboard-list { list-style: none; }
        .leaderboard-item { display: flex; align-items: center; padding: 12px; margin-bottom: 8px; background: rgba(255, 255, 255, 0.02); border-radius: 12px; border: 1px solid rgba(100, 150, 255, 0.05); }
        .rank-number { width: 32px; height: 32px; background: rgba(100, 150, 255, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; color: rgba(255, 255, 255, 0.6); margin-left: 12px; font-size: 13px; flex-shrink: 0; }
        .rank-number.top { background: linear-gradient(135deg, #FFC107 0%, #FFA000 100%); color: #000; }
        .leaderboard-item .player-avatar { width: 40px; height: 40px; font-size: 16px; margin: 0 12px 0 12px; }
        .leaderboard-info { flex: 1; }
        .leaderboard-name { font-weight: 700; color: #fff; margin-bottom: 2px; font-size: 12px; }
        .leaderboard-stats { font-size: 10px; color: rgba(255, 255, 255, 0.4); }
        .leaderboard-reward { background: rgba(100, 150, 255, 0.1); color: rgba(255, 255, 255, 0.7); padding: 6px 12px; border-radius: 10px; font-size: 10px; font-weight: 700; white-space: nowrap; }
        /* ─── رتبتي فوق الشريط ─── */
        .rank-pill { position: fixed; bottom: 68px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, rgba(26,35,126,0.95), rgba(40,53,147,0.95)); color: #fff; border: 1px solid rgba(100,150,255,0.3); padding: 7px 20px; border-radius: 30px; font-weight: 800; cursor: pointer; font-size: 12px; display: none; align-items: center; gap: 7px; z-index: 999; backdrop-filter: blur(12px); font-family: 'Tajawal', sans-serif; box-shadow: 0 4px 20px rgba(26,35,126,0.4); white-space: nowrap; }
        .rank-pill svg { width: 16px; height: 16px; fill: #FFC107; }
        .rank-pill-label { color: rgba(255,255,255,0.7); font-weight: 600; font-size: 11px; }
        /* ─── أزرار جانبية عائمة (مربعة) ─── */
        .side-btns { position: fixed; left: 14px; bottom: 140px; display: flex; flex-direction: column; gap: 10px; z-index: 998; }
        .side-btn { width: 56px; height: 56px; border-radius: 16px; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-family: 'Tajawal', sans-serif; font-size: 10px; font-weight: 800; transition: all 0.22s cubic-bezier(.4,0,.2,1); box-shadow: 0 4px 18px rgba(0,0,0,0.45); }
        .side-btn svg { width: 22px; height: 22px; fill: #fff; flex-shrink: 0; }
        .side-btn span { font-size: 9px; font-weight: 800; color: rgba(255,255,255,0.9); line-height: 1; }
        .side-btn-tasks { background: linear-gradient(145deg, #1e40af, #2563eb); border: 1px solid rgba(96,165,250,0.3); }
        .side-btn-tasks.active { background: linear-gradient(145deg, #2563eb, #60a5fa); box-shadow: 0 0 0 3px rgba(96,165,250,0.35), 0 6px 20px rgba(30,64,175,0.5); transform: scale(1.06); border-color: rgba(96,165,250,0.5); }
        .side-btn-tasks:active { transform: scale(0.94); }
        .side-btn-lb { background: linear-gradient(145deg, #b45309, #d97706); border: 1px solid rgba(251,191,36,0.25); }
        .side-btn-lb.active { background: linear-gradient(145deg, #d97706, #fbbf24); box-shadow: 0 0 0 3px rgba(251,191,36,0.35), 0 6px 20px rgba(180,83,9,0.5); transform: scale(1.06); border-color: rgba(251,191,36,0.5); }
        .side-btn-lb:active { transform: scale(0.94); }
        .side-btn-rank { background: linear-gradient(145deg, #6b21a8, #9333ea); border: 1px solid rgba(192,132,252,0.3); }
        .side-btn-rank.active { background: linear-gradient(145deg, #9333ea, #c084fc); box-shadow: 0 0 0 3px rgba(192,132,252,0.35), 0 6px 20px rgba(107,33,168,0.5); transform: scale(1.06); border-color: rgba(192,132,252,0.5); }
        .side-btn-rank:active { transform: scale(0.94); }
        .side-btn-rank-num { font-size: 11px; font-weight: 900; color: #f0abfc; line-height: 1; }
        .rewards-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.9); z-index: 2000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .rewards-modal.active { display: flex; }
        .modal-content { background: linear-gradient(180deg, #0f0f1a 0%, #0a0a10 100%); border-radius: 20px; padding: 25px; max-width: 480px; width: 100%; max-height: 80vh; overflow-y: auto; animation: slideUp 0.3s ease; border: 1px solid rgba(100, 150, 255, 0.1); }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-header { text-align: center; margin-bottom: 25px; }
        .modal-header h2 { color: #FFC107; font-size: 22px; margin-bottom: 8px; font-weight: 900; }
        .modal-header p { color: rgba(255, 255, 255, 0.4); font-size: 12px; }
        .reward-item { display: flex; align-items: center; padding: 15px; background: rgba(255, 255, 255, 0.02); border-radius: 14px; margin-bottom: 12px; border: 1px solid rgba(100, 150, 255, 0.08); }
        .reward-rank { width: 45px; height: 45px; background: linear-gradient(135deg, #FFC107 0%, #FFA000 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: 900; margin-left: 18px; margin-right: 6px; font-size: 16px; flex-shrink: 0; }
        .reward-details { flex: 1; }
        .reward-details h4 { color: #fff; margin-bottom: 8px; font-weight: 800; font-size: 14px; }
        .reward-items-list { display: flex; flex-wrap: wrap; gap: 6px; }
        .reward-item-tag { background: rgba(100, 150, 255, 0.15); color: rgba(255, 255, 255, 0.8); padding: 5px 10px; border-radius: 8px; font-size: 10px; font-weight: 700; display: flex; align-items: center; gap: 4px; border: 1px solid rgba(100, 150, 255, 0.2); cursor: pointer; }
        .reward-item-tag.coins { background: linear-gradient(135deg, #FFC107 0%, #FFA000 100%); color: #000; border: none; }
        .reward-item-tag.dollars { background: linear-gradient(135deg, #00c853 0%, #69f0ae 100%); color: #000; border: none; }
        .reward-item-tag img { width: 18px; height: 18px; object-fit: cover; border-radius: 4px; }
        .close-modal { width: 100%; padding: 14px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(100, 150, 255, 0.1); border-radius: 12px; font-weight: 700; color: #fff; cursor: pointer; margin-top: 18px; font-family: 'Tajawal', sans-serif; font-size: 14px; }
        .preview-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.95); z-index: 5000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .preview-modal.active { display: flex; }
        .preview-content { background: linear-gradient(180deg, #0f0f1a 0%, #0a0a10 100%); border-radius: 20px; padding: 25px; max-width: 380px; width: 100%; text-align: center; border: 1px solid rgba(100, 150, 255, 0.1); animation: zoomIn 0.3s ease; }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .preview-image { width: 180px; height: 180px; background: rgba(100, 150, 255, 0.05); border-radius: 16px; margin: 0 auto 18px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(100, 150, 255, 0.1); overflow: hidden; }
        .preview-image img { width: 100%; height: 100%; object-fit: contain; }
        .preview-title { color: #FFC107; font-size: 20px; font-weight: 900; margin-bottom: 8px; }
        .preview-description { color: rgba(255, 255, 255, 0.5); font-size: 12px; margin-bottom: 18px; line-height: 1.6; }
        .close-preview { padding: 12px 28px; background: linear-gradient(135deg, #1a237e 0%, #283593 100%); border: none; border-radius: 10px; color: #fff; font-weight: 700; cursor: pointer; font-size: 13px; font-family: 'Tajawal', sans-serif; }
        .no-data { text-align: center; padding: 40px 20px; color: rgba(255, 255, 255, 0.4); font-size: 14px; }
        /* ── تبويبات منجزة/غير منجزة داخل كل قسم ── */
        .task-inner-tabs { display: flex; gap: 0; margin-bottom: 14px; background: rgba(255,255,255,0.03); border-radius: 12px; padding: 4px; border: 1px solid rgba(100,150,255,0.08); }
        .task-inner-tab { flex: 1; padding: 8px 6px; font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.45); background: none; border: none; border-radius: 9px; cursor: pointer; font-family: 'Tajawal', sans-serif; transition: all 0.22s; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .task-inner-tab svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
        .task-inner-tab.active { background: linear-gradient(135deg, #1a237e, #283593); color: #fff; box-shadow: 0 2px 10px rgba(26,35,126,0.4); }
        .task-inner-tab.done-tab.active { background: linear-gradient(135deg, #1b5e20, #2e7d32); box-shadow: 0 2px 10px rgba(27,94,32,0.4); }
        .task-sub-count { background: rgba(255,255,255,0.15); color: inherit; font-size: 10px; font-weight: 900; padding: 1px 6px; border-radius: 8px; }
        /* ── صندوق المكافأة الجديد الرفيع ── */
        .task-reward-slim { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-radius: 12px; margin: 10px 0; background: rgba(255,193,7,0.06); border: 1px solid rgba(255,193,7,0.12); gap: 10px; }
        .task-reward-slim-info { flex: 1; min-width: 0; }
        .task-reward-slim-title { font-size: 12px; font-weight: 800; color: #FFC107; display: flex; align-items: center; gap: 6px; }
        .task-reward-slim-title svg { width: 14px; height: 14px; fill: #FFC107; flex-shrink: 0; }
        .task-reward-slim-sub { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 2px; }
        .btn-show-reward { background: linear-gradient(135deg, #1e40af, #2563eb); border: 1px solid rgba(96,165,250,0.35); color: #fff; padding: 6px 12px; border-radius: 9px; font-size: 10px; font-weight: 800; cursor: pointer; white-space: nowrap; font-family: 'Tajawal', sans-serif; transition: all 0.2s; flex-shrink: 0; display:inline-flex; align-items:center; gap:4px; box-shadow: 0 2px 10px rgba(30,64,175,0.4); }
        .btn-show-reward:hover { background: linear-gradient(135deg, #2563eb, #3b82f6); transform: scale(1.03); }
        /* ── نافذة تفاصيل مكافأة المهمة - وسط الصفحة ── */
        .task-reward-detail-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 4000; align-items: center; justify-content: center; backdrop-filter: blur(14px); padding: 20px; }
        .task-reward-detail-modal.active { display: flex; }
        .task-reward-detail-box { background: linear-gradient(170deg, #0f1a35 0%, #080e22 60%, #070c1c 100%); border-radius: 24px; width: 100%; max-width: 390px; padding: 0 0 22px; border: 1px solid rgba(100,150,255,0.2); animation: zoomIn 0.32s cubic-bezier(.22,.8,.44,1); max-height: 88vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04); }
        .trd-modal-top { background: linear-gradient(135deg, #0d2060 0%, #1a3a8a 50%, #0d1f60 100%); border-radius: 24px 24px 0 0; padding: 20px 18px 18px; position:relative; overflow:hidden; }
        .trd-modal-top::before { content:''; position:absolute; top:-30px; right:-30px; width:100px; height:100px; background:radial-gradient(circle, rgba(100,150,255,0.2), transparent 70%); border-radius:50%; }
        .trd-modal-top-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
        .trd-modal-badge { display:flex; align-items:center; gap:9px; }

        function buildAvatar(photoURL, name, uid, extraStyle) {

            var wrap = document.createElement('div');
            wrap.className = 'player-avatar';
            if (uid && uid !== 'undefined') {
                wrap.style.cursor = 'pointer';
                wrap.dataset.uid = uid;
                wrap.setAttribute('onclick', 'goToProfile(this.dataset.uid)');
            }
            if (extraStyle) wrap.style.cssText += extraStyle;
            if (photoURL) {
                _avCounter++;
                var shimId = 'shim_av_' + _avCounter;
                var shim = document.createElement('div');
                shim.className = 'av-shimmer';
                shim.id = shimId;
                var img = document.createElement('img');
                img.className = 'av-img';
                img.src = photoURL;
                img.alt = initial;
                (function(sid, w, ini) {
                    img.onload = function() {
                        this.classList.add('loaded');
                        var s = document.getElementById(sid);
                        if (s) s.classList.add('hidden');
                    };
                    img.onerror = function() {
                        this.style.display = 'none';
                        var s = document.getElementById(sid);
                        if (s) s.classList.add('hidden');
                        w.textContent = ini;
                    };
                })(shimId, wrap, initial);
                wrap.appendChild(shim);
                wrap.appendChild(img);
            } else {
                wrap.textContent = initial;
            }
            return wrap.outerHTML;
        }

        // ==================== تحميل المهام من Firebase ====================
        function loadTasks() {
            var container = document.getElementById('tasks-container');
            container.innerHTML = '<div class="loading">' + T('loadingTasks') + '</div>';
            console.log('🔄 Loading tasks from Firebase...');

            database.ref('tasks').once('value')
                .then(async snapshot => {
                    const val = snapshot.val();
                    console.log('📥 Raw tasks from Firebase:', val);
                    currentTasks = val || {};
                    const count = Object.keys(currentTasks).length;
                    console.log(`✅ Loaded ${count} tasks`);
                    if (count === 0) {
                        container.innerHTML = '<div class="no-data">' + T('noTasksYet') + '</div>';
                        return;
                    }
                    const uid = currentUser.uid;
                    if (uid) {
                        // ── احتساب التقدم لكل مهمة بشكل مستقل بناءً على createdAt ──
                        for (const tid of Object.keys(currentTasks)) {
                            const t = currentTasks[tid];
                            const taskCreatedAt = t.createdAt || 0;

                            try {
                                if (t.type === 'posts') {
                                    // فقط المنشورات الجديدة بعد إنشاء المهمة
                                    let count = 0;
                                    const postsSnap = await database.ref('posts').orderByChild('authorUid').equalTo(uid).once('value');
                                    postsSnap.forEach(c => {
                                        const p = c.val();
                                        const postTime = p.createdAt || p.timestamp || p.ts || 0;
                                        if (postTime >= taskCreatedAt) {
                                            // فحص requireImage إن وُجد
                                            if (t.requireImage === true) {
                                                if (p.imageUrl || p.image || p.mediaUrl || p.photoUrl) count++;
                                            } else if (t.requireImage === false) {
                                                if (!p.imageUrl && !p.image && !p.mediaUrl && !p.photoUrl) count++;
                                            } else {
                                                count++;
                                            }
                                        }
                                    });
                                    currentTasks[tid].currentProgress = count;

                                } else if (t.type === 'likes') {
                                    // اللايكات التي أعطاها المستخدم على منشورات بعد إنشاء المهمة
                                    let likesCount = 0;
                                    const likesSnap = await database.ref('likes').orderByChild('userId').equalTo(uid).once('value');
                                    if (likesSnap.exists()) {
                                        // جلب كل المنشورات دفعةً واحدة للمقارنة
                                        const allPostsSnap = await database.ref('posts').once('value');
                                        const allPosts = allPostsSnap.val() || {};
                                        likesSnap.forEach(c => {
                                            const lk = c.val();
                                            const likeTime = lk.createdAt || lk.timestamp || lk.ts || 0;
                                            if (likeTime < taskCreatedAt) return;
                                            const postId = lk.postId || lk.targetId || '';
                                            if (!postId) return;
                                            const post = allPosts[postId];
                                            if (!post) return;
                                            const hasImg = !!(post.imageUrl || post.image || post.mediaUrl || post.photoUrl);
                                            if (t.requireImage === true) {
                                                if (hasImg) likesCount++;
                                            } else if (t.requireImage === false) {
                                                if (!hasImg) likesCount++;
                                            } else {
                                                likesCount++;
                                            }
                                        });
                                    } else {
                                        // fallback: إذا لم توجد بيانات likes مستقلة، نحتسب likesCount من المنشورات المستلمة
                                        const likePostsSnap = await database.ref('posts').orderByChild('authorUid').equalTo(uid).once('value');
                                        likePostsSnap.forEach(c => {
                                            const p = c.val();
                                            const postTime = p.createdAt || p.timestamp || p.ts || 0;
                                            if (postTime < taskCreatedAt) return;
                                            const hasImg = !!(p.imageUrl || p.image || p.mediaUrl || p.photoUrl);
                                            if (t.requireImage === true) {
                                                if (hasImg) likesCount += (p.likesCount || 0);
                                            } else if (t.requireImage === false) {
                                                if (!hasImg) likesCount += (p.likesCount || 0);
                                            } else {
                                                likesCount += (p.likesCount || 0);
                                            }
                                        });
                                    }
                                    currentTasks[tid].currentProgress = likesCount;

                                } else if (t.type === 'views') {
                                    // فقط المشاهدات على منشورات جديدة بعد إنشاء المهمة
                                    let viewsCount = 0;
                                    const viewPostsSnap = await database.ref('posts').orderByChild('authorUid').equalTo(uid).once('value');
                                    viewPostsSnap.forEach(c => {
                                        const p = c.val();
                                        const postTime = p.createdAt || p.timestamp || p.ts || 0;
                                        if (postTime >= taskCreatedAt) {
                                            viewsCount += (p.viewsCount || p.views || 0);
                                        }
                                    });
                                    currentTasks[tid].currentProgress = viewsCount;

                                } else if (t.type === 'followers') {
                                    // المتابعون الجدد بعد إنشاء المهمة
                                    let folCount = 0;
                                    const folSnap = await database.ref('followers').orderByChild('userId').equalTo(uid).once('value');
                                    folSnap.forEach(c => {
                                        const f = c.val();
                                        const fTime = f.createdAt || f.timestamp || f.ts || 0;
                                        if (fTime >= taskCreatedAt) folCount++;
                                    });
                                    currentTasks[tid].currentProgress = folCount;

                                } else if (t.type === 'audio-room') {
                                    // التقدم يُقرأ من userTaskProgress فقط (يُحدَّث عند الخروج من الغرفة)
                                    // لا نقرأ audioRoomTime التراكمي لأنه لا يحترم وقت إنشاء المهمة

                                } else if (t.type === 'video-room') {
                                    // التقدم يُقرأ من userTaskProgress فقط (يُحدَّث عند الخروج من الغرفة)
                                    // لا نقرأ videoRoomTime التراكمي لأنه لا يحترم وقت إنشاء المهمة

                                } else if (t.type === 'supporters') {
                                    // التقدم يُقرأ من userTaskProgress فقط (يُحدَّث عند إرسال هدية جديدة بعد إنشاء المهمة)
                                    // لا نقرأ totalGiftsSent التراكمي لأنه يشمل الهدايا القديمة قبل المهمة
                                }
                            } catch(e) {
                                console.warn('Progress calc error for task', tid, e);
                            }
                        }

                        // ── مراقبة التقدم الشخصي للغرف بشكل فوري (يُطلق فوراً ثم عند كل تغيير) ──
                        // نقرأ الاستلام مرة واحدة مسبقاً لتجنب التأخر
                        database.ref('userClaimedTasks/' + uid).once('value').then(function(initClaimedSnap) {
                            const initClaimed = initClaimedSnap.val() || {};
                            Object.keys(currentTasks).forEach(tid => {
                                currentTasks[tid]._claimed = !!initClaimed[tid];
                            });
                            database.ref('userTaskProgress/' + uid).on('value', function(progSnap) {
                                const progData = progSnap.val() || {};
                                Object.keys(currentTasks).forEach(tid => {
                                    const t = currentTasks[tid];
                                    const alreadyCalc = ['posts','likes','views','followers'];
                                    if (!alreadyCalc.includes(t.type) && progData[tid] !== undefined) {
                                        currentTasks[tid].currentProgress = progData[tid];
                                    }
                                });
                                // تحديث حالة الاستلام قبل الرسم لضمان ظهور زر "تم الاستلام" بشكل صحيح
                                database.ref('userClaimedTasks/' + uid).once('value').then(function(claimedSnap) {
                                    const claimedData = claimedSnap.val() || {};
                                    Object.keys(currentTasks).forEach(tid => {
                                        currentTasks[tid]._claimed = !!claimedData[tid];
                                    });
                                    renderTasks();
                                }).catch(function() { renderTasks(); });
                            });
                        }).catch(function() {
                            database.ref('userTaskProgress/' + uid).on('value', function(progSnap) {
                                const progData = progSnap.val() || {};
                                Object.keys(currentTasks).forEach(tid => {
                                    const t = currentTasks[tid];
                                    const alreadyCalc = ['posts','likes','views','followers'];
                                    if (!alreadyCalc.includes(t.type) && progData[tid] !== undefined) {
                                        currentTasks[tid].currentProgress = progData[tid];
                                    }
                                });
                                renderTasks();
                            });
                        });
                    }
                    // renderTasks تُستدعى من داخل الـ listener أعلاه مباشرةً
                    if (!currentUser || !currentUser.uid) renderTasks();
                })
                .catch(error => {
                    console.error('❌ Firebase tasks error:', error);
                    container.innerHTML = '<div class="no-data">' + T('loadError') + ': ' + error.message + '</div>';
                });
        }

        let _currentTaskSubTab = 'pending'; // 'pending' | 'done'

        function switchTaskSubTab(tab) {
            _currentTaskSubTab = tab;
            renderTasks();
        }

        function openTaskRewardDetail(taskId) {

            const coinsEl = document.getElementById('trdCoins');
            if (task.coins) {
                coinsEl.style.display = 'flex';
                document.getElementById('trdCoinsVal').textContent = task.coins;
            } else { coinsEl.style.display = 'none'; }
            var imgDefs = [
                { key:'frameUrl',    label:T('rFrame'),    soundKey:null,          expiryKey:'frame'    },
                { key:'titleUrl',    label:T('rTitle'),    soundKey:null,          expiryKey:'title'    },
                { key:'bigTitleUrl', label:T('rBigTitle'), soundKey:null,          expiryKey:'bigTitle' },
                { key:'badgeUrl',    label:T('rBadge'),    soundKey:null,          expiryKey:'badge'    },
                { key:'nameBadgeUrl',label:T('rNameBadge'),soundKey:null,          expiryKey:'nameBadge'},
                { key:'coverUrl',    label:T('rCover'),    soundKey:null,          expiryKey:'cover'    },
                { key:'entryUrl',    label:T('rEntry'),    soundKey:'entrySoundUrl',expiryKey:'entry'   }
            ];
            const found = imgDefs.filter(d => task[d.key]);
            const lbl = document.getElementById('trdImgsLabel');
            const row = document.getElementById('trdImgsRow');
            function msToText(ms) {
                if (!ms) return T('durPermanent');
                var d = Math.floor(ms / 86400000);
                var h = Math.floor((ms % 86400000) / 3600000);
                var m = Math.floor((ms % 3600000) / 60000);
                if (d > 0 && h === 0) return d + ' ' + T('durDay');
                if (d > 0) return d + T('durYear') + ' ' + h + T('durHour');
                if (h > 0) return h + T('durHour') + ' ' + m + T('durMin');
                return m + ' ' + T('durMin');
            }
            // بناء نص مدة بقاء المكافأة (عام - للكوينز)
            function buildRewardDurationText(task) {
                return '';
            }
            // إضافة عنصر مدة البقاء
            document.getElementById('trdRewardDuration').innerHTML = buildRewardDurationText(task);
            if (found.length) {
                lbl.style.display = 'flex'; lbl.childNodes[lbl.childNodes.length-1] && (lbl.lastChild.textContent = T('rewardImgsLbl'));
                row.innerHTML = found.map(d => {
                    const snd = d.soundKey && task[d.soundKey] ? task[d.soundKey] : '';
                    const exMs = task['expiry_' + d.expiryKey];
                    const durTxt = msToText(exMs);
                    const durColor = !exMs ? '#22c55e' : (exMs < 86400000 ? '#f97316' : (exMs < 259200000 ? '#eab308' : '#60a5fa'));
                    const durBadge = `<div style="font-size:9px;color:${durColor};font-weight:700;background:rgba(0,0,0,0.04);padding:1px 5px;border-radius:5px;margin-top:2px;">${durTxt}</div>`;
                    return `<div class="reward-img-chip" onclick="openTaskImgPreview('${task[d.key]}','${d.label}','${task.title||''}','${snd}')"><img src="${task[d.key]}" alt="${d.label}" onerror="this.parentElement.style.display='none'"><span>${d.label}${snd?' <svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z\"/></svg>':''}</span>${durBadge}</div>`;
                }).join('');
            } else { 
                lbl.style.display = 'none'; 
                row.innerHTML = '';
                // إظهار رسالة لا توجد مكافآت إذا لم تكن هناك كوينز ولا صور
                if (!task.coins) {
                    row.innerHTML = '<div class="trd-no-reward">' +
                        '<div class="trd-no-reward-icon">🎁</div>' +
                        '<div class="trd-no-reward-text">' + T('noRewardTitle') + '</div>' +
                        '<div class="trd-no-reward-sub">' + T('noRewardSub') + '</div>' +

            document.getElementById('taskRewardDetailModal').classList.add('active');
        }

        function closeTaskRewardDetail() {
            document.getElementById('taskRewardDetailModal').classList.remove('active');
        }

        // ==================== مساعد وقت انتهاء المهمة ====================
        function buildExpiryHtml(task) {
            if (!task.expiresAt) return '';
            var exp = typeof task.expiresAt === 'number' ? task.expiresAt : new Date(task.expiresAt).getTime();
            if (!exp) return '';
            var now = Date.now();
            var diff = exp - now;
            var d = new Date(exp);
            var dateStr = d.toLocaleDateString('ar-SA-u-nu-latn', { year:'numeric', month:'long', day:'numeric' });
            var timeStr = d.toLocaleTimeString('ar-SA-u-nu-latn', { hour:'2-digit', minute:'2-digit' });
            var cls = 'exp-ok', prefix = T('expireAt');
            if (diff < 0)           { cls = 'exp-past'; prefix = T('expiredAt'); }
            else if (diff < 172800000) { cls = 'exp-soon'; prefix = T('expireSoon'); }
            return `<div class="task-expiry ${cls}"><svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>${prefix} ${dateStr} — ${timeStr}</div>`;
        }

        // حذف المهام المنتهية التي لم تُنجز، والإبقاء على المنجزة غير المستلَمة
        function checkAndExpireTasks() {
            var now = Date.now();
            Object.keys(currentTasks).forEach(tid => {
                const t = currentTasks[tid];
                if (!t.expiresAt) return;
                const exp = typeof t.expiresAt === 'number' ? t.expiresAt : new Date(t.expiresAt).getTime();
                if (!exp || now < exp) return;
                if (t._claimed) {
                    // استُلمت المكافأة + انتهى الوقت → احذف من Firebase
                    database.ref('tasks/' + tid).remove().catch(() => {});
                    return;
                }
                const progress = t.currentProgress || 0;
                var isCompleted = progress >= (t.target || 1);
                if (!isCompleted) {
                    // لم تُنجز + انتهى الوقت → احذف
                    database.ref('tasks/' + tid).remove().catch(() => {});
                }
                // أُنجزت ولم تُستلم → لا تحذف (المستخدم يحتاج للاستلام أولاً)
            });
        }

            const found = imgDefs.filter(d => task[d.key]);

        function renderTasks() {
            var container = document.getElementById('tasks-container');
            const allTasks = Object.values(currentTasks);
            console.log(`🎯 Rendering tasks for type: "${currentTaskType}", total tasks: ${allTasks.length}`);
            checkAndExpireTasks();
            var now = Date.now();
            const filtered = allTasks.filter(t => {
                console.log(`  - Task: "${t.title}" | type: "${t.type}" | match: ${t.type === currentTaskType}`);
                if (t.type !== currentTaskType) return false;
                // إخفاء المهام المنتهية التي لم تُنجز
                if (t.expiresAt) {
                    const exp = typeof t.expiresAt === 'number' ? t.expiresAt : new Date(t.expiresAt).getTime();
                    if (exp && now > exp) {
                        const done = (t.currentProgress || 0) >= (t.target || 1);
                        if (!done && !t._claimed) return false;
                    }
                }
                return true;
            });

            console.log(`✅ ${filtered.length} tasks match type "${currentTaskType}"`);

            if (filtered.length === 0) {
                container.innerHTML = '<div class="no-data">' + T('noTasks') + '</div>';
                return;
            }

            const pendingTasks = filtered.filter(t => {
                const prog = t.currentProgress || 0;
                return prog < (t.target || 1) && !t._claimed;
            });
            const doneTasks = filtered.filter(t => {
                const prog = t.currentProgress || 0;
                return prog >= (t.target || 1) || t._claimed;
            });

            var subTabHtml =
                '<div class="task-inner-tabs">' +
                    '<button class="task-inner-tab ' + (_currentTaskSubTab === 'pending' ? 'active' : '') + '" onclick="switchTaskSubTab(&apos;pending&apos;)">' +
                        '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' +
                        T('pending') +
                        '<span class="task-sub-count">' + pendingTasks.length + '</span>' +
                    '</button>' +
                    '<button class="task-inner-tab done-tab ' + (_currentTaskSubTab === 'done' ? 'active' : '') + '" onclick="switchTaskSubTab(&apos;done&apos;)">' +
                        '<svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>' +
                        T('done') +
                        '<span class="task-sub-count">' + doneTasks.length + '</span>' +
                    '</button>' +
                '</div>';

            const activeTasks = _currentTaskSubTab === 'done' ? doneTasks : pendingTasks;

            if (activeTasks.length === 0) {
                container.innerHTML = subTabHtml + '<div class="no-data">' + (_currentTaskSubTab === 'done' ? T('noDone') : T('noPending')) + '</div>';
                return;
            }

            container.innerHTML = subTabHtml + activeTasks.map(task => {
                var isRoomTask = (task.type === 'video-room' || task.type === 'audio-room');
                const progress = task.currentProgress || 0;
                const target = task.target || 1;
                // للغرف: الهدف يُعرض بالدقائق (roomMinutes)، والتقدم: 0 أو 1 (منجزة أم لا)
                var roomMins = task.roomMinutes || 1;
                var displayProgress = isRoomTask ? (progress >= 1 ? roomMins : 0) : progress;
                var displayTarget = isRoomTask ? roomMins : target;
                var displayUnit = isRoomTask ? T('minuteUnit') : '';
                var percentage = isRoomTask
                    ? (progress >= 1 ? 100 : 0)
                    : Math.min((progress / target) * 100, 100);
                var isCompleted = progress >= target;
                var isClaimed = task._claimed || false;

                // حساب العد التنازلي
                var countdownHtml = '';
                if (task.expiresAt) {
                    var exp = typeof task.expiresAt === 'number' ? task.expiresAt : new Date(task.expiresAt).getTime();
                    if (exp) {
                        const diff = exp - Date.now();
                        if (diff > 0) {
                            const h = Math.floor(diff/3600000);
                            const m = Math.floor((diff%3600000)/60000);
                            const d = Math.floor(diff/86400000);
                            var timeStr;
                            if (d >= 1 && (h % 24) === 0) {
                                timeStr = d + T('durYear');
                            } else if (d >= 1) {
                                timeStr = d + T('durYear') + ' و' + (h % 24) + T('durHour');
                            } else if (h > 0) {
                                timeStr = h + T('durHour') + ' و' + m + T('durMin');
                            } else {
                                timeStr = m + T('durMin');
                            }
                            countdownHtml = '<span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;color:#16a34a;background:#ffffff;padding:4px 10px;border-radius:8px;">' +
                                '<svg width="12" height="12" viewBox="0 0 24 24" fill="#16a34a"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>' +
                                timeStr + '</span>';
                        } else {
                            countdownHtml = '<span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:800;color:#ef5350;background:rgba(228,30,63,0.08);padding:4px 9px;border-radius:7px;border:1px solid rgba(228,30,63,0.2);"><svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg> ' + T('expired') + '</span>';
                        }
                    }
                }

                var claimBtnHtml = isClaimed
                    ? '<span style="background:linear-gradient(135deg,#1b5e20,#2e7d32);color:#a5d6a7;padding:6px 14px;border-radius:9px;font-size:11px;font-weight:800;display:inline-flex;align-items:center;gap:4px;border:1px solid rgba(76,175,80,0.3);">' + T('claimedBadge') + '</span>'
                    : '<button class="btn-claim" ' + (isCompleted ? '' : 'disabled') + ' onclick="claimReward(\'' + task.id + '\')">' +
                      (isCompleted ? T('claimBtn') : T('notComplete')) +
                      '</button>';

                return `
                    <div class="task-card ${isClaimed ? 'is-claimed' : (isCompleted ? 'is-completed' : '')}">
                        <div class="task-header">
                            <div class="task-icon">
                                <svg viewBox="0 0 24 24"><path d="${getTaskIcon(task.type)}"/></svg>
                            </div>
                            <div class="task-title" style="flex:1;min-width:0;">
                                <h3>${task.title || 'مهمة'}</h3>
                                <p>${task.description || ''}</p>

        // ==================== نظام إعادة ضبط التصنيف الأسبوعي/الشهري ====================
        const RESET_PERIODS = {
            likes:        { ms: 7  * 86400000 },
            views:        { ms: 7  * 86400000 },
            'video-room': { ms: 7  * 86400000 },
            'audio-room': { ms: 7  * 86400000 },
            supporters:   { ms: 7  * 86400000 },
            followers:    { ms: 30 * 86400000 }
        };

        function getRankGroup(rank) {
            if (rank === 1)  return '1';
            if (rank === 2)  return '2';
            if (rank === 3)  return '3';
            if (rank >= 4  && rank <= 10)  return '4-10';
            if (rank >= 11 && rank <= 20)  return '11-20';
            if (rank >= 21 && rank <= 100) return '21-100';
            return null;
        }

        async function checkLeaderboardResets() {
            if (!currentUser.uid) return;
            var now = Date.now();
            for (const type of Object.keys(RESET_PERIODS)) {
                try {
                    const s = await database.ref('leaderboardResets/' + type + '/lastReset').once('value');
                    const last = s.val() || 0;
                    if (now - last >= RESET_PERIODS[type].ms) {
                        await processLeaderboardReset(type, now);
                    }
                } catch(e) {}
            }
        }

        async function processLeaderboardReset(type, now) {
            // 1. مكافآت التصنيف
            const rwSnap = await database.ref('leaderboardRewards/' + type).once('value');
            const rwVal  = rwSnap.val();
            const rewards = rwVal ? (Array.isArray(rwVal) ? rwVal : Object.values(rwVal)) : [];

            // 2. بناء التصنيف
            const usersSnap = await database.ref('users').once('value');
            const usersRaw  = usersSnap.val() || {};
            const userMap   = {};
            Object.entries(usersRaw).forEach(([uid, u]) => {
                userMap[uid] = { uid: uid, name: u.yourname || u.name || 'مستخدم', value: 0, photoURL: u.avatar || u.photoURL || null };
            });

            if (type === 'likes') {
                const ps = await database.ref('posts').once('value');
                Object.values(ps.val() || {}).forEach(p => { if (p.authorUid && userMap[p.authorUid]) userMap[p.authorUid].value += (p.likesCount || 0); });
            } else if (type === 'views') {
                const rs = await database.ref('reels').once('value');
                Object.values(rs.val() || {}).forEach(r => { const u = r.authorUid || r.userId || r.uid; if (u && userMap[u]) userMap[u].value += (r.viewsCount || r.views || 0); });
            } else if (type === 'followers') {
                const fs = await database.ref('followers').once('value');
                Object.values(fs.val() || {}).forEach(f => { const u = f.userId || f.followedId || f.uid; if (u && userMap[u]) userMap[u].value++; });
            } else if (type === 'video-room' || type === 'audio-room') {
                const field = type === 'video-room' ? 'videoRoomTime' : 'audioRoomTime';
                Object.entries(usersRaw).forEach(([uid, u]) => { if (userMap[uid]) userMap[uid].value = u[field] || 0; });
            } else if (type === 'supporters') {
                Object.entries(usersRaw).forEach(([uid, u]) => { if (userMap[uid]) userMap[uid].value = u.giftLeaderPoints || u.totalGiftsSent || 0; });
            }

            const sorted = Object.values(userMap).filter(u => u.value > 0).sort((a, b) => b.value - a.value);
            var _typeLabels = getCategoryTexts();
            var typeName = (_typeLabels[type] && _typeLabels[type].name) || type;
            var periodLabel = type === 'followers' ? (_lang === 'en' ? 'Monthly' : 'الشهري') : (_lang === 'en' ? 'Weekly' : 'الأسبوعي');

            // 3. إرسال إشعار لكل مستخدم ضمن أول 100
            for (let i = 0; i < Math.min(sorted.length, 100); i++) {
                const rank = i + 1;
                const user = sorted[i];
                if (!user.uid) continue;
                const group = getRankGroup(rank);
                if (!group) continue;

                // ابحث عن مكافأة هذه الرتبة
                let rewardData = null;
                if (group !== '21-100') {
                    for (const r of rewards) {
                        const rv = String(r.rank);
                        if (rv === String(rank)) { rewardData = r; break; }
                        if (rv.includes('-')) {
                            const [mn, mx] = rv.split('-').map(Number);
                            if (rank >= mn && rank <= mx) { rewardData = r; break; }
                        }
                    }
                }

                const hasReward = rewardData && (rewardData.coins || rewardData.dollars || rewardData.frameUrl || rewardData.titleUrl || rewardData.bigTitleUrl || rewardData.badgeUrl || rewardData.entryUrl || rewardData.coverUrl);
                const isClaimable = group !== '21-100' && hasReward;

                let notifText = `تم تحديث تصنيف ${typeName} ${periodLabel} — وصلت إلى المركز #${rank}`;
                if (isClaimable && rewardData.coins) notifText += ` — مكافأتك: ${rewardData.coins} عملة`;

                const nData = {
                    type:               isClaimable ? 'leaderboard_reward' : 'leaderboard_update',
                    toUserId:           user.uid,
                    fromUserId:         'system',
                    fromName:           'YADWOR',
                    fromAvatar:         '',
                    text:               notifText,
                    leaderboardType:    type,
                    leaderboardTypeName:typeName,
                    rank:               rank,
                    rankGroup:          group,
                    reward:             isClaimable ? rewardData : null,
                    claimed:            false,
                    createdAt:          firebase.database.ServerValue.TIMESTAMP,
                    isRead:             false
                };
                await database.ref('notifications').push(nData);
            }

            // 4. تحديث وقت آخر إعادة ضبط
            await database.ref('leaderboardResets/' + type).update({ lastReset: now });
        }

        // ==================== تحميل التصنيف ====================
        async function loadLeaderboard(type) {
            currentLeaderboardType = type;
            var container = document.getElementById('leaderboard-content');
            container.innerHTML = '<div class="loading">' + T('loadingRank') + '</div>';

            try {
                // ── 1. تحميل مكافآت التصنيف ──
                const rwSnap = await database.ref('leaderboardRewards/' + type).once('value');
                const rwVal  = rwSnap.val();
                currentLeaderboardRewards[type] = rwVal
                    ? (Array.isArray(rwVal) ? rwVal : Object.values(rwVal))
                    : [];

                // ── 2. تحميل بيانات المستخدمين الأساسية ──
                const usersSnap = await database.ref('users').once('value');
                const usersRaw  = usersSnap.val() || {};

                // بناء خريطة uid → {name, avatar}
                const userMap = {};
                Object.entries(usersRaw).forEach(([uid, u]) => {
                    userMap[uid] = {
                        uid,
                        name:     u.yourname || u.name || u.displayName || u.username || 'مستخدم',
                        photoURL: u.avatar || u.photoURL || null,
                        value: 0
                    };
                });

                // ── 3. حساب القيم حسب نوع التصنيف ──
                if (type === 'likes') {
                    // مجموع لايكات منشورات كل مستخدم
                    const postsSnap = await database.ref('posts').once('value');
                    const posts = postsSnap.val() || {};
                    Object.values(posts).forEach(p => {
                        if (p.authorUid && userMap[p.authorUid]) {
                            userMap[p.authorUid].value += (p.likesCount || 0);
                        }
                    });

                } else if (type === 'views') {
                    // مجموع مشاهدات ريلز كل مستخدم
                    const reelsSnap = await database.ref('reels').once('value');
                    const reels = reelsSnap.val() || {};
                    Object.values(reels).forEach(r => {
                        const uid = r.authorUid || r.userId || r.uid;
                        if (uid && userMap[uid]) {
                            userMap[uid].value += (r.viewsCount || r.views || 0);
                        }
                    });

                } else if (type === 'followers') {
                    // عدد المتابعين من جدول followers
                    const folSnap = await database.ref('followers').once('value');
                    const fols = folSnap.val() || {};
                    Object.values(fols).forEach(f => {
                        const uid = f.userId || f.followedId || f.uid;
                        if (uid && userMap[uid]) {
                            userMap[uid].value += 1;
                        }
                    });

                } else if (type === 'video-room' || type === 'audio-room') {
                    // وقت الغرف من users node مباشرة
                    const field = type === 'video-room' ? 'videoRoomTime' : 'audioRoomTime';
                    Object.entries(usersRaw).forEach(([uid, u]) => {
                        if (userMap[uid]) {
                            userMap[uid].value = u[field] || u.roomTime || 0;
                        }
                    });

                } else if (type === 'supporters') {
                    // نقاط التصنيف: giftLeaderPoints = نقطة لكل هدية + senderPoints من إعداد الهدية
                    Object.entries(usersRaw).forEach(([uid, u]) => {
                        if (userMap[uid]) {
                            userMap[uid].value = u.giftLeaderPoints || u.totalGiftsSent || u.giftsCount || u.supportersScore || 0;
                        }
                    });
                }

                renderLeaderboard(type, currentLeaderboardRewards[type], userMap);

            } catch (err) {
                console.error('❌ Leaderboard error:', err);
                container.innerHTML = '<div class="no-data">' + T('loadError') + ': ' + err.message + '</div>';
            }
        }

        // دالة تنسيق القيمة حسب نوع التصنيف
        function fmtLeaderVal(val, t) {
            if ((t === 'video-room' || t === 'audio-room') && val > 0) {
                return val + ' دقيقة';
            }
            return val.toLocaleString();
        }

        function renderLeaderboard(type, rewards, users) {
            categoryTexts = getCategoryTexts();
            var container = document.getElementById('leaderboard-content');
            var icons = {
                supporters:  'M20 6h-2.18c.11-.31.18-.65.18-1 0-1.66-1.34-3-3-3-1.05 0-1.96.54-2.5 1.35l-.5.67-.5-.68C10.96 2.54 10.05 2 9 2 7.34 2 6 3.34 6 5c0 .35.07.69.18 1H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2z',
                likes:       'M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z',
                views:       'M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z',
                followers:   'M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z',
                'video-room':'M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z',
                'audio-room':'M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z'
            };

            // users هنا هو userMap مع القيم المحسوبة مسبقاً في loadLeaderboard
                var sortedUsers = Object.values(users)
                .sort((a, b) => b.value - a.value);
            // تحديد رتبة المستخدم الحالي
            if (currentUser.uid) {
                const idx = sortedUsers.findIndex(u => u.uid === currentUser.uid);
                currentUser.rank  = idx >= 0 ? idx + 1 : null;
                const me = sortedUsers[idx];
                currentUser.value  = me ? me.value : 0;
                currentUser.name   = me ? me.name  : (currentUser.name || '');
                currentUser.avatar = me ? me.photoURL : (currentUser.avatar || '');
            }
            document.getElementById('userRankDisplay').textContent = currentUser.rank ? '#'+currentUser.rank : '#-';
            const sideRankEl = document.getElementById('sideRankNum');
            if (sideRankEl) sideRankEl.textContent = currentUser.rank ? '#'+currentUser.rank : '#-';

            var top3 = sortedUsers.slice(0, 3);
            var rest = sortedUsers.slice(3);

            let html = `
                <div class="leaderboard-fixed-section">
                    <div class="leaderboard-header">
                        <h3 class="leaderboard-title">
                            <svg viewBox="0 0 24 24"><path d="${icons[type] || icons.likes}"/></svg>
                            ${T('rankingTitle')}: ${(getCategoryTexts()[type] && getCategoryTexts()[type].name) || type}
                        </h3>
                        <button class="btn-rewards" onclick="showRewardsModal('${type}')">
                            <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                            ${T('rewardsBtn')}
                        </button>
                    </div>
                    <div class="top-three">
                        ${renderPodiumItem(top3[1], 2, type)}
                        ${renderPodiumItem(top3[0], 1, type)}
                        ${renderPodiumItem(top3[2], 3, type)}
                    </div>
                </div>
                <div class="leaderboard-scroll-section">
                    <ul class="leaderboard-list">
            `;

            rest.forEach(function(item, idx) {
                var rank = idx + 4;
                var avHtml = buildAvatar(item.photoURL, item.name, item.uid, '');
                html += '<li class="leaderboard-item">' +
                    '<div class="rank-number ' + (rank <= 10 ? 'top' : '') + '">' + rank + '</div>' +
                    avHtml +
                    '<div class="leaderboard-info">' +
                        '<div class="leaderboard-name">' + item.name + '</div>' +
                        '<div class="leaderboard-stats">' + fmtLeaderVal(item.value, type) + ' ' + ((type === 'video-room' || type === 'audio-room') ? '' : ((getCategoryTexts()[type] && getCategoryTexts()[type].unit) || '')) + '</div>' +
                    '</div>' +
                    '<div class="leaderboard-reward">' + getRewardForRank(rank, type) + '</div>' +
                    '</li>';
            });

            html += '</ul></div>';
            container.innerHTML = html;
        }

        function renderPodiumItem(user, rank, type) {
            var empty = !user;
            var name  = empty ? '---' : user.name;
            var rawVal = empty ? 0 : user.value;
            var value  = empty ? '0' : fmtLeaderVal(rawVal, type);
            var cls    = rank === 1 ? 'first' : rank === 2 ? 'second' : 'third';
            var uid    = (!empty && user.uid) ? user.uid : '';
            var avHtml = empty
                ? '<div class="player-avatar"></div>'
                : buildAvatar(user.photoURL, name, uid, '');
            var crown  = (rank === 1 && !empty)
                ? '<div class="crown"><svg viewBox="0 0 24 24"><path d="M5 16L3 5l5.5 5L12 4l3.5 6L21 5l-2 11H5zm14 3c0 .6-.4 1-1 1H6c-.6 0-1-.4-1-1v-1h14v1z"/></svg></div>'
                : '';
            return '<div class="top-player ' + cls + '">' +
                '<div class="rank-badge">' + rank + '</div>' +
                avHtml +
                crown +
                '<div class="player-name">' + name + '</div>' +
                '<div class="player-points">' + value + '</div>' +
                '</div>';
        }

        function getUserValue(user, type) {
            switch (type) {
                case 'likes':      return user.likesCount    || user.likes       || 0;
                case 'views':      return user.viewsCount    || user.views       || 0;
                case 'followers':  return user.followersCount|| user.followers   || 0;
                case 'video-room': return user.videoRoomTime || 0;
                case 'audio-room': return user.audioRoomTime || 0;
                case 'supporters': return user.giftLeaderPoints || user.totalGiftsSent || user.giftsCount || user.supportersScore || 0;
                default:           return 0;
            }
        }

        function getRewardForRank(rank, type) {
            const rewardType = type || currentLeaderboardType;
            const rewards = currentLeaderboardRewards[rewardType] || [];
            for (const r of rewards) {
                const rv = String(r.rank);
                if (rv === String(rank)) {
                    return r.coins ? (r.coins + ' ' + T('coinUnit')) : (r.dollars ? ('$' + r.dollars) : '-');
                }
                if (rv.includes('-')) {
                    const [min, max] = rv.split('-').map(Number);
                    if (rank >= min && rank <= max) {
                        return r.coins ? (r.coins + ' ' + T('coinUnit')) : (r.dollars ? ('$' + r.dollars) : '-');
                    }
                }
            }
            // قيم افتراضية إذا لم توجد بيانات
            if (rank === 1) return '2000 ' + T('coinUnit');
            if (rank === 2) return '1500 ' + T('coinUnit');
            if (rank === 3) return '1000 ' + T('coinUnit');
            if (rank >= 4 && rank <= 10) return '500 ' + T('coinUnit');
            if (rank >= 11 && rank <= 20) return '200 ' + T('coinUnit');
            return '50 ' + T('coinUnit');
        }

        // ==================== نافذة المكافآت ====================
        function showRewardsModal(category) {
            const modal = document.getElementById('rewardsModal');
            const list = document.getElementById('rewardsList');
            const rewards = currentLeaderboardRewards[category] || [];
            var rankLabels = {
                '1': T('rank1'), '2': T('rank2'), '3': T('rank3'),
                '4-10': T('rank4to10'), '11-20': T('rank11to20')
            };
            var imgKeys = [
                { k: 'frameUrl',    l: T('rFrame'),    snd: null             },
                { k: 'titleUrl',    l: T('rTitle'),    snd: null             },
                { k: 'bigTitleUrl', l: T('rBigTitle'), snd: null             },
                { k: 'badgeUrl',    l: T('rBadge'),    snd: null             },
                { k: 'entryUrl',    l: T('rEntry'),    snd: 'entrySoundUrl'  },
                { k: 'coverUrl',    l: T('rCover'),    snd: null             },
                { k: 'linkUrl',     l: T('rLink'),     snd: null             }
            ];

            if (rewards.length === 0) {
                list.innerHTML = '<div class="no-data">' + T('noLeaderReward') + '</div>';
            } else {
                list.innerHTML = rewards.map(r => {
                    var rankLabel = rankLabels[String(r.rank)] || (T('rankingTitle') + ' ' + r.rank);
                    const imgs = imgKeys.filter(ik => r[ik.k]).map(ik => {
                        const snd = ik.snd && r[ik.snd] ? r[ik.snd] : '';
                        return `<span class="reward-item-tag" onclick="showPreview('${r[ik.k]}','${ik.l}','${rankLabel}','${snd}')">
                            <img src="${r[ik.k]}">${ik.l}${snd ? ' <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>' : ''}
                        </span>`;
                    }).join('');
                    return `
                        <div class="reward-item">
                            <div class="reward-rank">${r.rank}</div>
                            <div class="reward-details">
                                <h4>${rankLabel}</h4>
                                <div class="reward-items-list">
                                    ${r.coins  ? '<span class="reward-item-tag coins">' + r.coins + ' ' + T('coinUnit') + '</span>' : ''}
                                    ${r.dollars ? `<span class="reward-item-tag dollars">$${r.dollars}</span>` : ''}
                                    ${imgs}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
            modal.classList.add('active');
        }

        function showPreview(imgUrl, title, description, soundUrl) {
            document.getElementById('previewImage').innerHTML =
                `<img src="${imgUrl}" alt="${title}">`;
            document.getElementById('previewTitle').textContent = title;
            document.getElementById('previewDescription').textContent = description;
            document.getElementById('previewModal').classList.add('active');
            if (_previewAudio) { _previewAudio.pause(); _previewAudio = null; }
            if (soundUrl) {
                _previewAudio = new Audio(soundUrl);
                _previewAudio.play().catch(()=>{});
            }
        }

        function closeRewardsModal() { document.getElementById('rewardsModal').classList.remove('active'); }
        function closePreviewModal() { document.getElementById('previewModal').classList.remove('active'); if(_previewAudio){_previewAudio.pause();_previewAudio=null;} }
        function closeRankModal() {
            document.getElementById('rankModal').classList.remove('active');
        }

        function jumpToUser() {
            var type = currentLeaderboardType;
            categoryTexts = getCategoryTexts();
            var ct = categoryTexts[type] || { name: type, unit: '', label: '' };

            // تحديث عنوان النافذة
            categoryTexts = getCategoryTexts();
            document.getElementById('rankModalTitle').textContent = T('myRankIn') + ' ' + ct.name;
            document.getElementById('rankModalCategory').textContent = ct.label;

            // صورة واسم المستخدم
            var av = document.getElementById('rankModalAvatar');
            if (currentUser.avatar) { av.src = currentUser.avatar; av.style.display = 'block'; }
            else { av.style.display = 'none'; }
            document.getElementById('rankModalName').textContent = currentUser.name || 'أنا';

            var body = document.getElementById('rankModalBody');

            if (currentUser.rank) {
                var val = currentUser.value || 0;
                body.innerHTML =
                    '<div class="rank-modal-cards">' +
                        '<div class="rank-modal-card highlight">' +
                            '<span class="rank-modal-card-val">#' + currentUser.rank + '</span>' +
                            '<span class="rank-modal-card-lbl">' + T('myRankLabel') + '</span>' +
                        '</div>' +
                        '<div class="rank-modal-card">' +
                            '<span class="rank-modal-card-val">' + val.toLocaleString() + '</span>' +
                            '<span class="rank-modal-card-lbl">' + ct.unit + '</span>' +
                        '</div>' +
                    '</div>';
            } else {
                body.innerHTML =
                    '<div class="rank-modal-not-ranked">' +
                        '<svg width="40" height="40" viewBox="0 0 24 24" fill="rgba(255,255,255,0.2)" style="margin-bottom:10px"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>' +
                        '<p>' + T('notRanked') + ' ' + ct.name + ' ' + T('notRankedYet') + '</p>' +
                    '</div>';
            }

            document.getElementById('rankModal').classList.add('active');
        }

        window.onclick = e => {
            if (e.target.id === 'rewardsModal') closeRewardsModal();
            if (e.target.id === 'previewModal') closePreviewModal();
            if (e.target.id === 'rankModal') closeRankModal();
            if (e.target.id === 'taskRewardDetailModal') closeTaskRewardDetail();
        };
    
    // ── Image Shimmer ──
    function ensureShimmerForImg(img) {
        if (!img || img.dataset._shimmerBound === '1') return;
        img.dataset._shimmerBound = '1';
        var host = img.parentElement;
        if (!host) return;
        host.classList.add('img-shimmer-host');
        var layer = host.querySelector(':scope > .img-shimmer-layer');
        if (!layer) {
            layer = document.createElement('div');
            layer.className = 'img-shimmer-layer sk';
            host.appendChild(layer);
        }
        function onOk() { img.classList.remove('img-loading'); img.classList.add('img-loaded'); if (layer) layer.style.display = 'none'; }
        function onErr() { img.classList.add('img-loading'); if (layer) layer.style.display = 'block'; }
        img.classList.add('img-loading');
        img.addEventListener('load', onOk);
        img.addEventListener('error', onErr);
        if (img.complete) { if (img.naturalWidth && img.naturalHeight) onOk(); else onErr(); }
    }
    // Apply shimmer to all images dynamically
    var _imgObs = new MutationObserver(function(muts) {
        muts.forEach(function(m) { m.addedNodes.forEach(function(n) {
            if (n.nodeType === 1) {
                if (n.tagName === 'IMG') ensureShimmerForImg(n);
                n.querySelectorAll && n.querySelectorAll('img').forEach(ensureShimmerForImg);
            }
        }); });
    });
    _imgObs.observe(document.body, { childList:true, subtree:true });
    document.querySelectorAll('img').forEach(ensureShimmerForImg);
</script>
