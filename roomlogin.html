<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>YADWOR — الدخول</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--primary:#1877f2;--green:#42b72a;--red:#e41e3f;--bg:#f0f2f5;--card:#fff;--txt:#050505;--sub:#65676b;--border:#ddd;}
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif;-webkit-tap-highlight-color:transparent;}
    html,body{min-height:100%; width:100%;  background:#fffff; display:flex;align-items:center;justify-content:center;padding:0px;}
    #loader{position:fixed;inset:0;background:#ffffff; z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
    .spin{#0D47A1:44px;height:44px;border:5px solid rgba(255,255,255,.25);border-top-color:white;border-radius:50%;animation:spin 1s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    #loader p{color:white;font-weight:700;font-size:1rem;}

    .card{background:white;border-radius:0px;padding:28px 22px;width:100%;max-width:100%;box-shadow:0 20px 60px rgba(0,0,0,.0);}

    /* Logo */
    .logo{text-align:center;margin-bottom:20px;}
    .logo-ttl{font-size:32px;font-weight:800;color:var(--primary);letter-spacing:3px;}
    .logo-sub{font-size:13px;color:var(--sub);margin-top:4px;}

    /* Mode tabs */
    .mode-tabs{display:flex;background:#f0f2f5;border-radius:12px;padding:4px;margin-bottom:22px;gap:4px;}
    .mode-tab{flex:1;padding:9px;text-align:center;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;border:none;background:none;font-family:'Tajawal',sans-serif;color:var(--sub);}
    .mode-tab.active{background:white;color:var(--primary);box-shadow:0 2px 8px rgba(0,0,0,.1);}

    /* Forms */
    .form-section{display:none;}
    .form-section.active{display:block;}

    .input-group{margin-bottom:14px;}
    .input-group label{font-size:12px;font-weight:700;color:var(--sub);display:block;margin-bottom:5px;}
    .input-group input, .input-group select{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;font-size:14px;font-family:'Tajawal',sans-serif;outline:none;transition:border .2s;color:var(--txt);}
    .input-group input:focus, .input-group select:focus{border-color:var(--primary);background:white;}
    .input-group select{appearance:none;cursor:pointer;}

    /* Two column */
    .row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

    /* Avatar upload */
    .avatar-upload{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
    .av-circle{width:64px;height:64px;border-radius:50%;background:var(--bg);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;flex-shrink:0;}
    .av-circle img{width:100%;height:100%;object-fit:cover;}
    .av-circle svg{width:28px;height:28px;stroke:var(--sub);}
    .av-label{font-size:12px;color:var(--sub);line-height:1.5;}
    .av-label strong{display:block;font-size:13px;color:var(--txt);margin-bottom:2px;}

    /* Action buttons */
    .btn-main{width:100%;padding:14px;border:none;border-radius:14px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;transition:.2s;margin-top:4px;}
    .btn-login{background:var(--primary);color:white;}
    .btn-register{background:linear-gradient(135deg,#1877f2,#9c27b0);color:white;}
    .btn-main:disabled{opacity:.6;cursor:not-allowed;}
    .btn-main:active{transform:scale(.98);}

    .error-msg{color:var(--red);font-size:12px;font-weight:600;text-align:center;padding:8px;background:#fff5f5;border-radius:8px;margin-bottom:10px;display:none;}
    .success-msg{color:var(--green);font-size:12px;font-weight:600;text-align:center;padding:8px;background:#f0fff4;border-radius:8px;margin-bottom:10px;display:none;}

    .divider{text-align:center;color:var(--sub);font-size:12px;margin:14px 0;position:relative;}
    .divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border);}
    .divider::before{right:0;} .divider::after{left:0;}

    /* Terms */
    .terms{font-size:11px;color:var(--sub);text-align:center;margin-top:12px;line-height:1.6;}
    .terms a{color:var(--primary);text-decoration:none;font-weight:600;}

    /* ID badge preview */
    .id-preview{background:linear-gradient(135deg,#1877f2,#9c27b0);color:white;border-radius:12px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:13px;}
    .id-preview svg{width:18px;height:18px;fill:none;stroke:white;stroke-width:2;flex-shrink:0;}
    .id-num{font-size:18px;font-weight:800;letter-spacing:2px;}
  </style>
</head>
<body>

<div id="loader">
  <div class="spin"></div>
  <p>جاري التحقق...</p>
</div>

<div class="card" id="mainCard" style="display:none;">
  <div class="logo">
    <div class="logo-ttl">YADWOR</div>
    <div class="logo-sub">منصة الغرف الصوتية والمرئية</div>
  </div>

  <div class="mode-tabs">
    <button class="mode-tab active" id="loginTab" onclick="switchMode('login')">تسجيل الدخول</button>
    <button class="mode-tab" id="registerTab" onclick="switchMode('register')">إنشاء حساب</button>
  </div>

  <!-- ═══ LOGIN ═══ -->
  <div class="form-section active" id="loginForm">
    <div class="error-msg" id="loginErr"></div>

    <div class="input-group">
      <label>البريد الإلكتروني</label>
      <input type="email" id="loginEmail" placeholder="example@mail.com">
    </div>
    <div class="input-group">
      <label>كلمة المرور</label>
      <input type="password" id="loginPass" placeholder="••••••" onkeypress="if(event.key==='Enter')doLogin()">
    </div>

    <button class="btn-main btn-login" id="loginBtn" onclick="doLogin()">دخول</button>
    <div class="terms">ليس لديك حساب؟ <a onclick="switchMode('register')" style="cursor:pointer;">أنشئ واحداً الآن</a></div>
  </div>

  <!-- ═══ REGISTER ═══ -->
  <div class="form-section" id="registerForm">
    <div class="error-msg" id="regErr"></div>
    <div class="success-msg" id="regOk"></div>

    <!-- صورة الملف الشخصي -->
    <div class="avatar-upload">
      <div class="av-circle" onclick="document.getElementById('avFileInput').click()">
        <img src="" id="avPreview" style="display:none;">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <div class="av-label">
        <strong>صورة الملف الشخصي</strong>
        اضغط لاختيار صورة (اختياري)
      </div>
      <input type="file" id="avFileInput" accept="image/*" style="display:none;" onchange="previewAvatar(this)">
    </div>

    <div class="row-2">
      <div class="input-group">
        <label>الاسم الأول *</label>
        <input type="text" id="regFirstName" placeholder="أحمد">
      </div>
      <div class="input-group">
        <label>اسم المستخدم *</label>
        <input type="text" id="regUsername" placeholder="ahmed99">
      </div>
    </div>

    <div class="input-group">
      <label>البريد الإلكتروني *</label>
      <input type="email" id="regEmail" placeholder="example@mail.com">
    </div>

    <div class="input-group">
      <label>كلمة المرور *</label>
      <input type="password" id="regPass" placeholder="8 أحرف على الأقل">
    </div>

    <div class="row-2">
      <div class="input-group">
        <label>تاريخ الميلاد</label>
        <input type="date" id="regBirth">
      </div>
      <div class="input-group">
        <label>الجنس</label>
        <select id="regGender">
          <option value="">اختر</option>
          <option value="male">ذكر</option>
          <option value="female">أنثى</option>
        </select>
      </div>
    </div>

    <div class="input-group">
      <label>الدولة *</label>
      <select id="regCountry">
        <option value="">اختر دولتك</option>
        <option value="SA">🇸🇦 المملكة العربية السعودية</option>
        <option value="AE">🇦🇪 الإمارات العربية المتحدة</option>
        <option value="KW">🇰🇼 الكويت</option>
        <option value="QA">🇶🇦 قطر</option>
        <option value="BH">🇧🇭 البحرين</option>
        <option value="OM">🇴🇲 عُمان</option>
        <option value="EG">🇪🇬 مصر</option>
        <option value="JO">🇯🇴 الأردن</option>
        <option value="LB">🇱🇧 لبنان</option>
        <option value="SY">🇸🇾 سوريا</option>
        <option value="IQ">🇮🇶 العراق</option>
        <option value="MA">🇲🇦 المغرب</option>
        <option value="DZ">🇩🇿 الجزائر</option>
        <option value="TN">🇹🇳 تونس</option>
        <option value="LY">🇱🇾 ليبيا</option>
        <option value="YE">🇾🇪 اليمن</option>
        <option value="SD">🇸🇩 السودان</option>
        <option value="OTHER">🌍 أخرى</option>
      </select>
    </div>

    <div class="input-group">
      <label>نبذة عنك (اختياري)</label>
      <input type="text" id="regBio" placeholder="مرحباً، أنا من...">
    </div>

    <!-- ID مُولَّد تلقائياً -->
    <div class="id-preview">
      <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M7 15h0M2 9h20"/></svg>
      <div>
        <div style="font-size:10px;opacity:.7;margin-bottom:2px;">رقم حسابك الخاص (مُولَّد تلقائياً)</div>
        <div class="id-num" id="generatedId">------</div>
      </div>
    </div>

    <button class="btn-main btn-register" id="regBtn" onclick="doRegister()">إنشاء الحساب</button>
    <div class="terms">بالتسجيل تقبل <a href="#">شروط الاستخدام</a> و<a href="#">سياسة الخصوصية</a></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyAP-xRJ5zvHvMmqkkVvXnWdqwfuuj58CcA",
  authDomain:"a-comment-5a3e5.firebaseapp.com",
  databaseURL:"https://a-comment-5a3e5-default-rtdb.firebaseio.com",
  projectId:"a-comment-5a3e5",
  storageBucket:"a-comment-5a3e5.appspot.com",
  messagingSenderId:"557343451166",
  appId:"1:557343451166:web:d181f098cdeccf7691260f"
});
const db = firebase.database(), auth = firebase.auth();

let generatedNumId = '';

// ─── Generate numeric ID ───
function generateNumericId() {
  return String(Math.floor(100000 + Math.random() * 900000));
}

// Ensure ID is unique
async function getUniqueId() {
  let id = generateNumericId();
  const snap = await db.ref('numericIds/'+id).once('value');
  if (snap.exists()) return getUniqueId(); // retry if taken
  return id;
}

// ─── Auth check ───
auth.onAuthStateChanged(async user => {
  if (user) {
    const snap = await db.ref('users/'+user.uid).once('value');
    if (snap.exists()) { location.href='index.html'; return; }
    await auth.signOut();
  }
  document.getElementById('loader').style.display = 'none';
  document.getElementById('mainCard').style.display = 'block';
  // Pre-generate ID for register form
  getUniqueId().then(id => {
    generatedNumId = id;
    document.getElementById('generatedId').textContent = id;
  });
});

// ─── Switch mode ───
function switchMode(mode) {
  ['login','register'].forEach(m => {
    document.getElementById(m+'Tab').classList.toggle('active', m===mode);
    document.getElementById(m+'Form').classList.toggle('active', m===mode);
  });
}

// ─── Login ───
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value.trim();
  const err = document.getElementById('loginErr');
  const btn = document.getElementById('loginBtn');
  err.style.display='none';
  if (!email || !pass) { showErr(err,'يرجى إدخال البريد وكلمة المرور'); return; }
  btn.disabled=true; btn.textContent='جاري الدخول...';
  try {
    const cred = await auth.signInWithEmailAndPassword(email, pass);
    const snap = await db.ref('users/'+cred.user.uid).once('value');
    if (!snap.exists()) { await auth.signOut(); showErr(err,'حساب غير مكتمل البيانات'); btn.disabled=false; btn.textContent='دخول'; return; }
    location.href='index.html';
  } catch(e) {
    let msg='خطأ في تسجيل الدخول';
    if(e.code==='auth/user-not-found') msg='لا يوجد حساب بهذا البريد';
    else if(e.code==='auth/wrong-password') msg='كلمة المرور غير صحيحة';
    else if(e.code==='auth/invalid-email') msg='صيغة البريد غير صحيحة';
    else if(e.code==='auth/invalid-credential') msg='البريد أو كلمة المرور غير صحيحة';
    showErr(err, msg);
    btn.disabled=false; btn.textContent='دخول';
  }
}

// ─── Register ───
let avatarDataUrl = null;

function previewAvatar(input) {
  if (!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    avatarDataUrl = e.target.result;
    const preview = document.getElementById('avPreview');
    preview.src = avatarDataUrl;
    preview.style.display = 'block';
    preview.parentElement.querySelector('svg').style.display = 'none';
  };
  reader.readAsDataURL(input.files[0]);
}

async function doRegister() {
  const firstName = document.getElementById('regFirstName').value.trim();
  const username = document.getElementById('regUsername').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass = document.getElementById('regPass').value.trim();
  const country = document.getElementById('regCountry').value;
  const birth = document.getElementById('regBirth').value;
  const gender = document.getElementById('regGender').value;
  const bio = document.getElementById('regBio').value.trim();
  const err = document.getElementById('regErr');
  const ok = document.getElementById('regOk');
  const btn = document.getElementById('regBtn');

  err.style.display='none'; ok.style.display='none';
  if (!firstName || !username || !email || !pass || !country) { showErr(err,'يرجى ملء جميع الحقول المطلوبة (*)'); return; }
  if (pass.length < 6) { showErr(err,'كلمة المرور يجب أن تكون 6 أحرف على الأقل'); return; }

  btn.disabled=true; btn.textContent='جاري إنشاء الحساب...';
  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    const uid = cred.user.uid;

    // Upload avatar if selected
    let avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(firstName)}&background=1877f2&color=fff&size=200&bold=true`;
    if (avatarDataUrl) {
      try {
        // Convert dataUrl to blob for Cloudinary
        var res = await fetch(avatarDataUrl);
        var blob = await res.blob();
        avatarUrl = await uploadToCloudinary(blob);
      } catch(e) { console.warn('Avatar upload failed, using default'); }
    }

    // Ensure unique numeric ID
    if (!generatedNumId) generatedNumId = await getUniqueId();
    const numId = generatedNumId;

    // Save user data
    const userData = {
      yourname: firstName,
      username: username,
      email: email,
      avatar: avatarUrl,
      country: country,
      bio: bio || '',
      gender: gender || '',
      birthdate: birth || '',
      numericId: numId,
      totalPoints: 0,
      totalSupport: 0,
      postsCount: 0,
      followersCount: 0,
      friendsCount: 0,
      isOnline: true,
      createdAt: firebase.database.ServerValue.TIMESTAMP,
      role: 'user'
    };

    await db.ref('users/'+uid).set(userData);
    await db.ref('numericIds/'+numId).set(uid); // reserve this ID

    ok.textContent = '✅ تم إنشاء الحساب بنجاح! جاري التوجيه...';
    ok.style.display='block';
    setTimeout(()=>location.href='index.html', 1500);
  } catch(e) {
    let msg='حدث خطأ أثناء إنشاء الحساب';
    if(e.code==='auth/email-already-in-use') msg='البريد الإلكتروني مستخدم بالفعل';
    else if(e.code==='auth/weak-password') msg='كلمة المرور ضعيفة جداً';
    else if(e.code==='auth/invalid-email') msg='صيغة البريد غير صحيحة';
    showErr(err, msg);
    btn.disabled=false; btn.textContent='إنشاء الحساب';
  }
}

function showErr(el, msg) { el.textContent=msg; el.style.display='block'; }

/* ── Cloudinary Upload Helper ── */
async function uploadToCloudinary(file, onProgress) {
    return new Promise(function(resolve, reject) {
        var xhr = new XMLHttpRequest();
        var fd  = new FormData();
        fd.append('file', file);
        fd.append('upload_preset', 'my_app_upload');
        var resType = (file.type && (file.type.startsWith('video/') || file.type.startsWith('audio/'))) ? 'video' : 'image';
        if (xhr.upload && onProgress) {
            xhr.upload.addEventListener('progress', function(e) {
                if (e.lengthComputable) onProgress(Math.round(e.loaded / e.total * 100));
            });
        }
        xhr.addEventListener('load', function() {
            if (xhr.status === 200) {
                var d = JSON.parse(xhr.responseText);
                d.secure_url ? resolve(d.secure_url) : reject(new Error(d.error ? d.error.message : 'Upload failed'));
            } else { reject(new Error('HTTP ' + xhr.status)); }
        });
        xhr.addEventListener('error', function() { reject(new Error('Network error')); });
        xhr.open('POST', 'https://api.cloudinary.com/v1_1/dlujoziwz/' + resType + '/upload');
        xhr.send(fd);
    });
}
</script>
</body>
</html>
