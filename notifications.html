<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الإشعارات - YADWOR</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#1877f2;--bg:#f0f2f5;--card:#ffffff;--txt:#050505;--sub:#65676b;--border:#eee;--red:#e41e3f;--green:#42b72a;--gold:#f1c40f;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--txt);padding-top:60px;padding-bottom:70px;}
#loader{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;}
.spin{width:36px;height:36px;border:4px solid #e1e8ed;border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.top-navbar{position:fixed;top:0;left:0;right:0;height:60px;background:var(--card);display:flex;justify-content:space-between;align-items:center;padding:0 15px;z-index:1000;box-shadow:0 1px 4px rgba(0,0,0,0.1);}
.nav-title{font-size:18px;font-weight:800;}
.nav-btn{background:none;border:none;cursor:pointer;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .2s;color:var(--txt);}
.nav-btn:hover{background:#f0f2f5;}
.nav-btn svg{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.mark-all{color:var(--primary);font-size:13px;font-weight:600;cursor:pointer;background:none;border:none;font-family:'Tajawal',sans-serif;}

/* Filters */
.filter-tabs{display:flex;gap:0;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;position:sticky;top:60px;z-index:5;}
.filter-tabs::-webkit-scrollbar{display:none;}
.ftab{padding:12px 16px;font-size:13px;font-weight:600;color:var(--sub);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:.2s;background:none;border:none;font-family:'Tajawal',sans-serif;border-bottom:2px solid transparent;}
.ftab.active{color:var(--primary);border-bottom-color:var(--primary);}

/* Notification items */
.notif-list{display:flex;flex-direction:column;}
.notif-item{background:var(--card);display:flex;align-items:flex-start;gap:12px;padding:14px 15px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .2s;position:relative;}
.notif-item.unread{background:#f0f7ff;}
.notif-item:hover{background:#f9f9f9;}
.notif-av-wrap{position:relative;width:48px;height:48px;flex-shrink:0;}
.notif-av-wrap img.av{width:100%;height:100%;border-radius:50%;object-fit:cover;border:2px solid #e1e8ed;}
.notif-type-icon{position:absolute;bottom:-2px;right:-2px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;border:2px solid white;}
.notif-body{flex:1;}
.notif-text{font-size:13px;line-height:1.5;margin-bottom:4px;}
.notif-text strong{font-weight:700;color:var(--txt);}
.notif-time{font-size:11px;color:var(--sub);}
.unread-dot{width:10px;height:10px;background:var(--primary);border-radius:50%;flex-shrink:0;margin-top:4px;}
.notif-thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0;}

/* Friend request actions */
.fr-actions{display:flex;gap:8px;margin-top:8px;}
.fr-btn{padding:7px 18px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif;transition:.2s;}
/* مكافأة التصنيف */
.lb-reward-card{background:linear-gradient(135deg,#f8f9ff,#eef1ff);border:1.5px solid #c7d2f8;border-radius:14px;padding:14px;margin-top:8px;}
.lb-reward-title{font-size:14px;font-weight:800;color:#1a237e;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.lb-reward-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.lb-reward-tag{padding:4px 10px;border-radius:8px;font-size:11px;font-weight:800;}
.lb-reward-tag.coins{background:#fff8e1;border:1px solid #ffe082;color:#e65100;}
.lb-reward-tag.item{background:#e8eaf6;border:1px solid #9fa8da;color:#283593;}
.lb-claim-btn{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;border:none;padding:10px 24px;border-radius:11px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;width:100%;transition:all .2s;}
.lb-claim-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(26,35,126,.3);}
.lb-claimed-badge{color:#2e7d32;font-size:12px;font-weight:800;display:flex;align-items:center;gap:5px;}
.fr-accept{background:var(--primary);color:white;}
.fr-decline{background:#e4e6eb;color:var(--txt);}

/* Skeleton */
.sk-notif{display:flex;align-items:center;gap:12px;padding:14px 15px;border-bottom:1px solid var(--border);background:white;}
.sk{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:sk 1.5s infinite;border-radius:8px;}
@keyframes sk{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.sk-circle{border-radius:50%;}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:var(--sub);}
.empty svg{width:56px;height:56px;stroke:var(--sub);fill:none;stroke-width:1.5;margin-bottom:12px;}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--card);display:flex;justify-content:space-around;align-items:center;border-top:1px solid var(--border);z-index:1000;}
.nav-item{display:flex;flex-direction:column;align-items:center;justify-content:center;color:#90949c;font-size:10px;gap:3px;flex:1;height:100%;cursor:pointer;border:none;background:none;font-family:'Tajawal',sans-serif;}
.nav-item svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.nav-item.active{color:var(--primary);}
.nav-item.active svg{stroke:var(--primary);}
</style>
</head>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyAP-xRJ5zvHvMmqkkVvXnWdqwfuuj58CcA",
  authDomain:"a-comment-5a3e5.firebaseapp.com",
  databaseURL:"https://a-comment-5a3e5-default-rtdb.firebaseio.com",
  projectId:"a-comment-5a3e5",
  storageBucket:"a-comment-5a3e5.appspot.com",
  messagingSenderId:"557343451166",
  appId:"1:557343451166:web:d181f098cdeccf7691260f"
});
const db = firebase.database(), auth = firebase.auth();
let myUid = null, allNotifs = [], currentFilter = 'all';

auth.onAuthStateChanged(user => {
  if (!user) { location.href='roomlogin.html'; return; }
    initNavDots(user.uid);
  myUid = user.uid;
  loadNotifs();
});

function loadNotifs() {
  db.ref('notifications/' + myUid).on('value', function(snap) {
    allNotifs = [];
    snap.forEach(function(s) {
      var n = s.val();
      if (n) allNotifs.unshift(Object.assign({}, n, {id: s.key}));
    });
    renderNotifs();
    document.getElementById('loader').style.display='none';
  });
}

function filterType(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderNotifs();
}

function renderNotifs() {
  const list = document.getElementById('notifList');
  let notifs = allNotifs;
  if (currentFilter !== 'all') {
    notifs = allNotifs.filter(n => {
      if (currentFilter === 'like') return n.type === 'like' || n.type === 'reel_like';
      if (currentFilter === 'comment') return n.type === 'comment' || n.type === 'reel_comment';
      if (currentFilter === 'gift') return n.type === 'gift' || n.type === 'reel_gift';
      if (currentFilter === 'leaderboard') return n.type === 'leaderboard_reward' || n.type === 'leaderboard_update' || n.type === 'lb_reward';
      return n.type === currentFilter;
    });
  }
  if (!notifs.length) {
    list.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><p>لا توجد إشعارات</p></div>`;
    return;
  }
  list.innerHTML = notifs.map(n => {
    const typeConfig = {
      follow:             {icon:'👤',bg:'#e7f3ff',label:'تابعك'},
      like:               {icon:'❤️',bg:'#fff0f0',label:'أعجب بمنشورك'},
      reel_like:          {icon:'❤️',bg:'#fff0f0',label:'أعجب بريلزك'},
      comment:            {icon:'💬',bg:'#e8f5e9',label:'علّق على منشورك'},
      reel_comment:       {icon:'💬',bg:'#e8f5e9',label:'علّق على ريلزك'},
      friend:             {icon:'🤝',bg:'#fff3e0',label:'طلب صداقتك'},
      gift:               {icon:'🎁',bg:'#fce4ec',label:'أرسل لك هدية'},
      reel_gift:          {icon:'🎁',bg:'#fce4ec',label:'أرسل لك هدية في ريلز'},
      message:            {icon:'✉️',bg:'#e3f2fd',label:'أرسل لك رسالة'},
      wardrobe:           {icon:'👜',bg:'#f3e5f5',label:'أُضيف إلى حقيبتك'},
      leaderboard_reward: {icon:'🏆',bg:'#fff8e1',label:'مكافأة تصنيف'},
      leaderboard_update: {icon:'📊',bg:'#e8eaf6',label:'تحديث تصنيف'}
    };
    const cfg = typeConfig[n.type] || {icon:'🔔',bg:'#f0f0f0',label:''};
    const fromAv = n.fromAvatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(n.fromName||'U')}`;
    const fromName = n.fromName || 'مستخدم';
    const time = timeAgo(n.createdAt);
    const frActions = n.type==='friend' && n.status!=='accepted' && n.status!=='declined' ? 
      `<div class="fr-actions">
        <button class="fr-btn fr-accept" onclick="acceptFriend('${n.id}','${n.fromUserId}',event)">قبول</button>
        <button class="fr-btn fr-decline" onclick="declineFriend('${n.id}',event)">رفض</button>
      </div>` : '';
    const link = n.type==='message' ? `chat.html?chatId=${[myUid,n.fromUserId].sort().join('_')}&name=${encodeURIComponent(fromName)}&av=${encodeURIComponent(fromAv)}&uid=${encodeURIComponent(n.fromUserId||'')}`
               : (n.type==='follow'||n.type==='friend') ? `profile.html?uid=${encodeURIComponent(n.fromUserId||'')}`
               : n.reelId ? `reels.html?reelId=${encodeURIComponent(n.reelId)}`
               : n.postId ? `index.html` : '#';

    // ── إشعار مكافأة التصنيف ──
    if (n.type === 'leaderboard_reward' || n.type === 'leaderboard_update' || n.type === 'lb_reward') {
      const reward = n.reward || null;
      const isClaimed = !!n.claimed;
      const rankLabel = n.rank ? `المركز #${n.rank}` : '';
      const typeName = n.leaderboardTypeName || '';
      let rewardSummary = '';
      if (reward) {
        if (reward.coins)   rewardSummary += `<span style="background:#fff8e1;border:1px solid #ffe082;color:#e65100;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:800;margin-left:5px;">${reward.coins} عملة</span>`;
        if (reward.frameUrl)    rewardSummary += `<span style="background:#e8eaf6;border:1px solid #9fa8da;color:#283593;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:800;margin-left:5px;">إطار</span>`;
        if (reward.titleUrl)    rewardSummary += `<span style="background:#e8eaf6;border:1px solid #9fa8da;color:#283593;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:800;margin-left:5px;">لقب</span>`;
        if (reward.bigTitleUrl) rewardSummary += `<span style="background:#fff3e0;border:1px solid #ffcc80;color:#e65100;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:800;margin-left:5px;">لقب أسطوري</span>`;
        if (reward.badgeUrl)    rewardSummary += `<span style="background:#e8eaf6;border:1px solid #9fa8da;color:#283593;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:800;margin-left:5px;">شارة</span>`;
        if (reward.entryUrl)    rewardSummary += `<span style="background:#e8eaf6;border:1px solid #9fa8da;color:#283593;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:800;margin-left:5px;">تأثير دخول</span>`;
        if (reward.coverUrl)    rewardSummary += `<span style="background:#e8eaf6;border:1px solid #9fa8da;color:#283593;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:800;margin-left:5px;">غلاف</span>`;
      }
      var claimable = (n.type === 'leaderboard_reward' || n.type === 'lb_reward') && reward && !isClaimed;
      var claimArea = claimable
        ? '<button class="lb-claim-btn" onclick="claimLeaderboardReward(\'' + n.id + '\',event)">🎁 استلام المكافأة</button>'
        : (isClaimed ? '<div class="lb-claimed-badge">✅ تم الاستلام</div>' : '');
      var lbTypeName = n.leaderboardTypeName || getLbTypeLabelNotif(n.lbType) || typeName;
      var lbRankNum  = n.rankNum || n.rank || '';
      return '<div class="notif-item ' + (n.isRead?'':'unread') + '" onclick="markNotifRead(\'' + n.id + '\')">'+
        '<div class="notif-av-wrap">'+
          '<div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#ffc107,#ff8f00);display:flex;align-items:center;justify-content:center;font-size:22px;">🏆</div>'+
        '</div>'+
        '<div class="notif-body">'+
          '<div class="lb-reward-card">'+
            '<div class="lb-reward-title">'+
              '🏆 مكافأة التصنيف' + (lbTypeName ? ' — ' + esc(lbTypeName) : '') +
            '</div>'+
            (lbRankNum ? '<div style="font-size:12px;color:#3949ab;font-weight:700;margin-bottom:6px;">المركز #' + lbRankNum + '</div>' : '')+
            '<div class="lb-reward-tags">' + rewardSummary + '</div>'+
            (n.message ? '<div style="font-size:12px;color:#555;margin-bottom:8px;">' + esc(n.message) + '</div>' : '')+
            claimArea+
          '</div>'+
          '<div class="notif-time" style="margin-top:6px;">' + time + '</div>'+
        '</div>'+
        (!n.isRead ? '<div class="unread-dot"></div>' : '')+
      '</div>';
    }

    return `<div class="notif-item ${n.isRead?'':'unread'}" onclick="openNotif('${n.id}','${link}')">
      <div class="notif-av-wrap">
        <img class="av" src="${esc(fromAv)}" onerror="this.src='https://ui-avatars.com/api/?name=U'">
        <div class="notif-type-icon" style="background:${cfg.bg};">${cfg.icon}</div>
      </div>
      <div class="notif-body">
        <div class="notif-text"><strong>${esc(fromName)}</strong> ${cfg.label} ${esc(n.text||'')}</div>
        <div class="notif-time">${time}</div>
        ${frActions}
      </div>
      ${!n.isRead?'<div class="unread-dot"></div>':''}
    </div>`;
  }).join('');
}

async function claimLeaderboardReward(notifId, e) {
  e.stopPropagation();
  if (!myUid) return;
  const snap = await db.ref('notifications/' + myUid + '/' + notifId).once('value');
  const n = snap.val();
  if (!n || n.claimed) { alert('تم الاستلام مسبقاً'); return; }
  const reward = n.reward || {};
  const updates = {};
  updates['notifications/' + myUid + '/' + notifId + '/claimed'] = true;
  updates['notifications/' + myUid + '/' + notifId + '/isRead']  = true;
  if (reward.frameUrl) {
    updates['users/' + myUid + '/ownedFrames/lb_' + notifId] = { imgUrl: reward.frameUrl, name: 'إطار تصنيف ' + (n.leaderboardTypeName||''), source: 'leaderboard', ts: Date.now() };
  }
  if (reward.titleUrl) {
    updates['users/' + myUid + '/ownedTitles/lb_' + notifId] = { imgUrl: reward.titleUrl, name: 'لقب تصنيف ' + (n.leaderboardTypeName||''), source: 'leaderboard', bigTitle: false, ts: Date.now() };
  }
  if (reward.bigTitleUrl) {
    updates['users/' + myUid + '/ownedTitles/lbg_' + notifId] = { imgUrl: reward.bigTitleUrl, name: 'لقب أسطوري تصنيف ' + (n.leaderboardTypeName||''), source: 'leaderboard', bigTitle: true, ts: Date.now() };
  }
  if (reward.badgeUrl) {
    updates['users/' + myUid + '/ownedBadges/lb_' + notifId] = { imgUrl: reward.badgeUrl, name: 'شارة تصنيف ' + (n.leaderboardTypeName||''), source: 'leaderboard', ts: Date.now() };
  }
  if (reward.entryUrl || reward.entrySoundUrl) {
    updates['users/' + myUid + '/ownedEntryEffects/lb_' + notifId] = { imgUrl: reward.entryUrl||'', soundUrl: reward.entrySoundUrl||'', name: 'تأثير دخول تصنيف ' + (n.leaderboardTypeName||''), source: 'leaderboard', ts: Date.now() };
  }
  if (reward.coverUrl) {
    updates['users/' + myUid + '/ownedCovers/lb_' + notifId] = { imgUrl: reward.coverUrl, name: 'غلاف تصنيف ' + (n.leaderboardTypeName||''), source: 'leaderboard', ts: Date.now() };
  }
  await db.ref().update(updates);
  if (reward.coins) {
    await db.ref('users/' + myUid + '/coins').transaction(c => (c || 0) + reward.coins);
  }
  // popup تأكيد
  const popup = document.createElement('div');
  popup.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';
  const box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:20px;padding:24px;max-width:340px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);';
  box.innerHTML = '<div style="font-size:17px;font-weight:900;color:#1a237e;margin-bottom:12px;">تم استلام مكافأة التصنيف</div>'
    + '<div style="color:#555;font-size:13px;margin-bottom:8px;">المركز #' + (n.rank||'') + ' — ' + esc(n.leaderboardTypeName||'') + '</div>'
    + (reward.coins ? '<div style="background:#fff8e1;border:1px solid #ffe082;border-radius:12px;padding:10px;color:#e65100;font-size:16px;font-weight:900;margin:10px 0;">+' + reward.coins + ' عملة</div>' : '');
  const btn = document.createElement('button');
  btn.textContent = 'حسناً';
  btn.style.cssText = 'width:100%;margin-top:10px;padding:12px;background:linear-gradient(135deg,#1a237e,#283593);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:Tajawal,sans-serif;';
  btn.onclick = () => document.body.removeChild(popup);
  box.appendChild(btn);
  popup.appendChild(box);
  document.body.appendChild(popup);
}

function openNotif(id, link) {
  db.ref('notifications/'+myUid+'/'+id).update({isRead:true});
  if (link && link!=='#') location.href=link;
}

function markAllRead() {
  allNotifs.forEach(function(n) {
    if (!n.isRead) db.ref('notifications/'+myUid+'/'+n.id).update({isRead:true});
  });
}

function acceptFriend(notifId, fromUid, e) {
  e.stopPropagation();
  const friendId = [myUid, fromUid].sort().join('_');
  db.ref('friends/'+friendId).update({status:'accepted', acceptedAt: firebase.database.ServerValue.TIMESTAMP});
  db.ref('notifications/'+notifId).update({status:'accepted', isRead:true});
  // Notify back
  db.ref('notifications').push({type:'friend_accepted',fromUserId:myUid,toUserId:fromUid,createdAt:firebase.database.ServerValue.TIMESTAMP,isRead:false});
  renderNotifs();
}

function declineFriend(notifId, e) {
  e.stopPropagation();
  db.ref('notifications/'+notifId).update({status:'declined', isRead:true});
  renderNotifs();
}

function timeAgo(ts) {
  if (!ts) return '';
  const d=(Date.now()-ts)/1000;
  if (d<60) return 'الآن';
  if (d<3600) return `منذ ${Math.floor(d/60)} دقيقة`;
  if (d<86400) return `منذ ${Math.floor(d/3600)} ساعة`;
  return `منذ ${Math.floor(d/86400)} يوم`;
}
function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function getLbTypeLabelNotif(type) {
    var names = {
        likes:'اللايكات', views:'المشاهدات', followers:'المتابعين',
        'video-room':'غرف الفيديو', 'audio-room':'غرف الصوت', supporters:'الداعمون'
    };
    return names[type] || '';
}

function markNotifRead(id) {
    db.ref('notifications/'+myUid+'/'+id).update({isRead:true, read:true});
}

// ── نقاط الإشعار في الشريط السفلي ──
function initNavDots(uid) {
    const db2 = firebase.database();
    // رسائل غير مقروءة
    db2.ref('chats').orderByChild('participants/'+uid).equalTo(true).on('value', s => {
        let unread = 0;
        s.forEach(c => { unread += (c.val().unread && c.val().unread[uid]) || 0; });
        const dot = document.getElementById('msgsNavDot');
        if (dot) dot.style.display = unread > 0 ? 'block' : 'none';
    });
    // أحداث جديدة
    const lastSeen = parseInt(localStorage.getItem('lastSeenEvents') || '0');
    db2.ref('settings/events').orderByChild('ts').startAt(lastSeen + 1).on('value', s => {
        const dot = document.getElementById('eventsNavDot');
        if (dot) dot.style.display = s.numChildren() > 0 ? 'block' : 'none';
    });
}
