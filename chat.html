<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دردشة - YADWOR</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#1877f2;--primary-dark:#1565c0;--bg:#f0f4f8;--card:#fff;--txt:#050505;--sub:#65676b;--border:#e0e0e0;--red:#e41e3f;--green:#42b72a;--mine:#ffffff;--mine-shadow:0 1px 4px rgba(24,119,242,.13);}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:#ffffff;color:var(--txt);display:flex;flex-direction:column;}

/* ─── Facebook Shimmer ─── */
.sk{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;}
.sk-circle{border-radius:50%!important;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* ─── Loader ─── */
#loader{position:fixed;inset:0;z-index:9999;background:#ffffff;display:flex;align-items:flex-start;justify-content:center;padding-top:14px;overflow:hidden;}
.spin{width:38px;height:38px;border:4px solid #e1e8ed;border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ─── Header ─── */
.chat-header{background:var(--primary);color:white;display:flex;align-items:center;gap:10px;padding:8px 12px;flex-shrink:0;position:relative;z-index:10;box-shadow:0 2px 6px rgba(0,0,0,0.2);}
.hdr-back{background:none;border:none;cursor:pointer;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;flex-shrink:0;}
.hdr-back svg{width:24px;height:24px;fill:none;stroke:white;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}

/* ─── صورة الهيدر مع Shimmer ─── */
.hdr-av-wrap{position:relative;flex-shrink:0;width:42px;height:42px;}
.hdr-av-shimmer{position:absolute;inset:0;border-radius:50%;background:linear-gradient(90deg,rgba(255,255,255,.2) 25%,rgba(255,255,255,.4) 50%,rgba(255,255,255,.2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;}
.hdr-av-shimmer.done{display:none;}
.hdr-av{position:absolute;inset:0;width:42px;height:42px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.4);background:transparent;display:none;opacity:0;transition:opacity .25s;}
.hdr-av.loaded{display:block;opacity:1;}
.hdr-online{position:absolute;bottom:1px;right:1px;width:11px;height:11px;background:var(--green);border-radius:50%;border:2px solid var(--primary);z-index:2;}

.hdr-info{flex:1;min-width:0;}
.hdr-name{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-status{font-size:12px;opacity:.85;margin-top:1px;}
.hdr-btn{background:none;border:none;cursor:pointer;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;transition:background .2s;flex-shrink:0;}
.hdr-btn:hover{background:rgba(255,255,255,.15);}
.hdr-btn svg{width:22px;height:22px;fill:none;stroke:white;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ─── خلفية المحادثة ─── */
.chat-bg{display:none;}
.chat-bg svg{width:100%;height:100%;}

/* ─── منطقة الرسائل ─── */
.msgs-area{flex:1;overflow-y:auto;padding:10px 10px 6px;display:flex;flex-direction:column;gap:2px;position:relative;z-index:1;background:#f0f2f5;}
.msgs-area::-webkit-scrollbar{width:4px;}
.msgs-area::-webkit-scrollbar-thumb{background:rgba(0,0,0,.2);border-radius:10px;}

/* ─── فاصل التاريخ ─── */
.date-sep{text-align:center;margin:10px 0 6px;position:relative;z-index:1;}
.date-sep span{background:rgba(255,255,255,.85);color:var(--sub);font-size:11px;font-weight:600;padding:4px 14px;border-radius:14px;box-shadow:0 1px 3px rgba(0,0,0,.12);backdrop-filter:blur(4px);}

/* ─── صف الرسالة ─── */
/* direction:ltr لتثبيت الاتجاه بغض النظر عن RTL الصفحة */
.msg-row{
  display:flex;
  align-items:flex-end;
  gap:8px;
  width:100%;
  animation:msgIn .22s ease;
  position:relative;
  z-index:1;
  direction:ltr;
}
@keyframes msgIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* theirs: [صورة يسار ثابتة][فقاعة رمادية] — الكل يبدأ من اليسار */
.msg-row.theirs{
  justify-content:flex-start;
  flex-direction:row;
}

/* mine: [فقاعة زرقاء][صورة يمين] */
.msg-row.mine{
  justify-content:flex-end;
  flex-direction:row;
}

/* الفقاعة لا تتجاوز 65% من العرض */
.msg-row .msg-bubble{max-width:calc(100% - 90px);}

/* صورة المرسل — ثابتة الحجم دائماً */
.msg-av-wrap{width:36px;height:36px;flex-shrink:0;align-self:flex-end;position:relative;border-radius:50%;overflow:hidden;}
.msg-av-sk{position:absolute;inset:0;border-radius:50%;z-index:1;width:100%;height:100%;}
.msg-av{position:absolute;inset:0;width:100%;height:100%;border-radius:50%;object-fit:cover;border:2px solid white;display:none;opacity:0;transition:opacity .3s ease;z-index:2;}
/* شفافة عندما مخفية للحفاظ على المسافة */
.msg-av-wrap.hidden{visibility:hidden;}

/* فقاعة الرسالة */
.msg-bubble{padding:9px 12px 7px;border-radius:18px;font-size:14px;line-height:1.55;word-break:break-word;position:relative;direction:rtl;text-align:right;}

/* رسالتي — أزرق تيل */
.msg-row.mine .msg-bubble{
  background:#00BCD4;
  color:#ffffff;
  border-radius:18px;
  border-bottom-right-radius:4px;
  box-shadow:none;
  border:none;
}

/* رسالة الطرف الآخر — أبيض */
.msg-row.theirs .msg-bubble{
  background:#ffffff;
  color:#111111;
  border-radius:18px;
  border-bottom-left-radius:4px;
  box-shadow:0 1px 2px rgba(0,0,0,.08);
  border:none;
}

/* وقت + حالة القراءة */
.msg-meta{display:flex;align-items:center;gap:3px;margin-top:3px;justify-content:flex-end;direction:ltr;}
.msg-time-txt{font-size:11px;color:#999;}
.msg-row.mine .msg-time-txt{color:rgba(255,255,255,.8);}
.msg-row.mine .msg-meta{justify-content:flex-end;}
.read-ticks{display:flex;align-items:center;}
.read-ticks svg{width:16px;height:16px;}

/* صورة في الرسالة */
.msg-img{max-width:220px;max-height:240px;border-radius:14px;cursor:pointer;display:block;object-fit:cover;}
.msg-audio{width:200px;margin-top:4px;height:36px;}

/* ─── حالة "يكتب" ─── */
.typing-row{display:flex;align-items:center;gap:8px;align-self:flex-end;padding:6px 0;animation:msgIn .2s ease;}
.typing-bubble{background:white;border-radius:18px;border-bottom-right-radius:5px;padding:10px 16px;box-shadow:0 1px 2px rgba(0,0,0,.1);display:flex;align-items:center;gap:4px;}
.typing-dot{width:7px;height:7px;background:#aaa;border-radius:50%;animation:typingBounce 1.2s infinite ease-in-out;}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes typingBounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-5px);}}

/* ─── شريط الإدخال ─── */
.input-bar{background:var(--card);border-top:1px solid var(--border);padding:8px 10px;display:flex;align-items:flex-end;gap:7px;flex-shrink:0;position:relative;z-index:10;}
.inp-side-btn{background:none;border:none;cursor:pointer;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--sub);transition:background .2s;flex-shrink:0;}
.inp-side-btn:hover{background:var(--bg);}
.inp-side-btn svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.inp-side-btn.rec-on{color:var(--red);animation:recPulse 1s infinite;}
@keyframes recPulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.inp-wrap{flex:1;background:#f0f2f5;border-radius:22px;display:flex;align-items:flex-end;padding:7px 14px;gap:6px;min-height:40px;}
.inp-textarea{flex:1;background:none;border:none;outline:none;font-size:14px;font-family:'Tajawal',sans-serif;resize:none;max-height:110px;overflow-y:auto;line-height:1.45;padding-top:1px;}
.send-btn{background:var(--primary);color:white;border:none;width:42px;height:42px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s,background .2s;box-shadow:0 2px 6px rgba(24,119,242,.35);}
.send-btn:active{transform:scale(.88);}
.send-btn:hover{background:var(--primary-dark);}
.send-btn svg{width:20px;height:20px;fill:none;stroke:white;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}

/* ─── معاينة الصورة ─── */
.img-preview-wrap{display:none;padding:8px 12px 0;background:var(--card);border-top:1px solid var(--border);}
.img-preview-wrap.show{display:flex;align-items:center;gap:10px;}
.img-preview-thumb{width:56px;height:56px;border-radius:10px;object-fit:cover;}
.img-preview-cancel{background:none;border:none;cursor:pointer;width:26px;height:26px;border-radius:50%;background:#f0f2f5;display:flex;align-items:center;justify-content:center;}
.img-preview-cancel svg{width:14px;height:14px;fill:none;stroke:var(--sub);stroke-width:2;stroke-linecap:round;}

/* ─── Modal عرض الصورة كاملة ─── */
.img-modal{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.img-modal.open{display:flex;}
.img-modal img{max-width:95%;max-height:88vh;object-fit:contain;border-radius:8px;}
.img-modal-close{position:absolute;top:14px;left:14px;background:rgba(255,255,255,.15);border:none;color:white;width:38px;height:38px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.img-modal-close svg{width:20px;height:20px;fill:none;stroke:white;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

input[type=file]{display:none;}

/* ─── صورة الرسالة ─── */
.msg-img-thumb{width:160px;height:160px;border-radius:12px;cursor:pointer;display:block;object-fit:cover;border:none;}

/* ─── فقاعة الصوت المخصصة ─── */
.audio-bubble{display:flex;align-items:center;gap:10px;padding:4px 2px;min-width:190px;}
.audio-play-btn{width:38px;height:38px;border-radius:50%;background:var(--primary);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s;}
.audio-play-btn:active{transform:scale(.88);}
.audio-play-btn svg{width:16px;height:16px;fill:white;}
.audio-wave{flex:1;height:28px;display:flex;align-items:center;gap:2px;overflow:hidden;}
.audio-wave span{display:inline-block;width:3px;border-radius:3px;background:var(--primary);opacity:.35;transform:scaleY(.4);transition:height .1s;}
.audio-wave span:nth-child(1){height:6px;}
.audio-wave span:nth-child(2){height:14px;}
.audio-wave span:nth-child(3){height:20px;}
.audio-wave span:nth-child(4){height:10px;}
.audio-wave span:nth-child(5){height:18px;}
.audio-wave span:nth-child(6){height:8px;}
.audio-wave span:nth-child(7){height:16px;}
.audio-wave span:nth-child(8){height:12px;}
.audio-wave span:nth-child(9){height:22px;}
.audio-wave span:nth-child(10){height:7px;}
@keyframes waveBar{0%,100%{transform:scaleY(.5);opacity:.45;}50%{transform:scaleY(1);opacity:1;}}
.audio-wave.playing span{animation:waveBar 1.1s ease-in-out infinite;opacity:1;}
.audio-wave.playing span:nth-child(1){animation-delay:0s;}
.audio-wave.playing span:nth-child(2){animation-delay:.1s;}
.audio-wave.playing span:nth-child(3){animation-delay:.2s;}
.audio-wave.playing span:nth-child(4){animation-delay:.3s;}
.audio-wave.playing span:nth-child(5){animation-delay:.4s;}
.audio-wave.playing span:nth-child(6){animation-delay:.5s;}
.audio-wave.playing span:nth-child(7){animation-delay:.15s;}
.audio-wave.playing span:nth-child(8){animation-delay:.25s;}
.audio-wave.playing span:nth-child(9){animation-delay:.35s;}
.audio-wave.playing span:nth-child(10){animation-delay:.45s;}
.audio-dur{font-size:11px;color:var(--sub);white-space:nowrap;flex-shrink:0;}
.msg-row.mine .audio-play-btn{background:var(--primary);}
.msg-row.mine .audio-wave span{background:var(--primary);}

/* ─── شريط الرد (Reply bar) ─── */
.reply-bar{display:none;padding:8px 14px;background:#f7f9fc;border-top:1px solid var(--border);align-items:center;gap:10px;direction:rtl;}
.reply-bar.show{display:flex;}
.reply-bar-line{width:3px;height:100%;background:var(--primary);border-radius:4px;flex-shrink:0;align-self:stretch;}
.reply-bar-content{flex:1;min-width:0;}
.reply-bar-name{font-size:12px;font-weight:700;color:var(--primary);margin-bottom:2px;}
.reply-bar-text{font-size:12px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.reply-bar-close{background:none;border:none;cursor:pointer;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--sub);flex-shrink:0;}
.reply-bar-close svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* اقتباس داخل الفقاعة */
.msg-reply-quote{background:rgba(0,0,0,.06);border-radius:8px;padding:6px 10px;margin-bottom:6px;border-right:3px solid var(--primary);direction:rtl;}
.msg-reply-quote-name{font-size:11px;font-weight:700;color:var(--primary);margin-bottom:2px;}
.msg-reply-quote-text{font-size:12px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ─── قائمة حذف الرسالة ─── */
.del-menu{position:fixed;background:white;border-radius:14px;box-shadow:0 8px 28px rgba(0,0,0,.16);z-index:5000;min-width:190px;overflow:hidden;animation:ctxIn .16s ease;}
@keyframes ctxIn{from{opacity:0;transform:scale(.92);}to{opacity:1;transform:scale(1);}}
.del-menu-item{display:flex;align-items:center;gap:11px;padding:13px 16px;cursor:pointer;font-size:14px;font-weight:600;transition:background .15s;color:var(--txt);}
.del-menu-item:hover{background:#f5f5f5;}
.del-menu-item.danger{color:var(--red);}
.del-menu-item svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.del-menu-sep{height:1px;background:var(--border);}
.del-overlay{position:fixed;inset:0;z-index:4999;}

/* ─── شريط التسجيل الصوتي ─── */
.rec-bar{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:white;align-items:center;gap:12px;padding:8px 14px;z-index:20;}
.rec-bar.show{display:flex;}
.rec-dot{width:12px;height:12px;border-radius:50%;background:var(--red);animation:recPulse 1s infinite;flex-shrink:0;}
.rec-timer{font-size:15px;font-weight:700;color:var(--txt);flex:1;}
.rec-cancel{background:#f0f2f5;border:none;cursor:pointer;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.rec-cancel svg{width:18px;height:18px;fill:none;stroke:var(--red);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.rec-send{background:var(--primary);border:none;cursor:pointer;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 6px rgba(24,119,242,.35);}
.rec-send svg{width:20px;height:20px;fill:none;stroke:white;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}

</style>
</head>
<body>

<div id="loader">
  <div style="display:flex;flex-direction:column;gap:14px;padding:14px;width:100%;max-width:480px;">
    <!-- shimmer row 1 — theirs -->
    <div style="display:flex;align-items:flex-end;gap:8px;">
      <div class="sk sk-circle" style="width:34px;height:34px;flex-shrink:0;"></div>
      <div class="sk" style="height:52px;width:55%;border-radius:18px;border-bottom-right-radius:5px;"></div>
    </div>
    <!-- shimmer row 2 — mine -->
    <div style="display:flex;align-items:flex-end;gap:8px;justify-content:flex-end;">
      <div class="sk sk-circle" style="width:34px;height:34px;flex-shrink:0;"></div>
      <div class="sk" style="height:42px;width:45%;border-radius:18px;border-bottom-left-radius:5px;"></div>
    </div>
    <!-- shimmer row 3 — theirs long -->
    <div style="display:flex;align-items:flex-end;gap:8px;">
      <div class="sk sk-circle" style="width:34px;height:34px;flex-shrink:0;"></div>
      <div class="sk" style="height:70px;width:70%;border-radius:18px;border-bottom-right-radius:5px;"></div>
    </div>
    <!-- shimmer row 4 — mine -->
    <div style="display:flex;align-items:flex-end;gap:8px;justify-content:flex-end;">
      <div class="sk sk-circle" style="width:34px;height:34px;flex-shrink:0;"></div>
      <div class="sk" style="height:42px;width:60%;border-radius:18px;border-bottom-left-radius:5px;"></div>
    </div>
    <!-- shimmer row 5 — theirs -->
    <div style="display:flex;align-items:flex-end;gap:8px;">
      <div class="sk sk-circle" style="width:34px;height:34px;flex-shrink:0;"></div>
      <div class="sk" style="height:48px;width:50%;border-radius:18px;border-bottom-right-radius:5px;"></div>
    </div>
    <!-- shimmer row 6 — mine image -->
    <div style="display:flex;align-items:flex-end;gap:8px;justify-content:flex-end;">
      <div class="sk sk-circle" style="width:34px;height:34px;flex-shrink:0;"></div>
      <div class="sk" style="width:120px;height:120px;border-radius:12px;"></div>
    </div>
  </div>
</div>

<!-- Header -->
<header class="chat-header">
  <button class="hdr-back" onclick="history.back()">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div class="hdr-av-wrap">
    <!-- Shimmer يظهر حتى تحميل الصورة -->
    <div class="hdr-av-shimmer" id="hdrAvShimmer"></div>
    <img class="hdr-av" id="hdrAv" alt="">
    <div class="hdr-online" id="hdrOnline" style="display:none;"></div>
  </div>
  <div class="hdr-info">
    <div class="hdr-name" id="hdrName">...</div>
    <div class="hdr-status" id="hdrStatus"></div>
  </div>
  <button class="hdr-btn" onclick="goToOtherProfile()" title="عرض الملف">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
  </button>
</header>

<!-- منطقة الرسائل -->
<div class="msgs-area" id="msgsArea"></div>

<!-- شريط الرد -->
<div class="reply-bar" id="replyBar">
  <div class="reply-bar-line"></div>
  <div class="reply-bar-content">
    <div class="reply-bar-name" id="replyBarName"></div>
    <div class="reply-bar-text" id="replyBarText"></div>
  </div>
  <button class="reply-bar-close" onclick="cancelReply()">
    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
</div>

<!-- معاينة صورة قبل الإرسال -->
<div class="img-preview-wrap" id="imgPreviewWrap">
  <img class="img-preview-thumb" id="imgPreviewThumb" src="">
  <span id="imgReadyTxt" style="font-size:13px;color:var(--sub);flex:1;">صورة جاهزة للإرسال</span>
  <button class="img-preview-cancel" onclick="cancelImgPreview()">
    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
</div>

<!-- شريط الإدخال -->
<div class="input-bar">
  <button class="inp-side-btn" onclick="document.getElementById('imgInput').click()" title="صورة">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
  </button>
  <div class="inp-wrap">
    <textarea class="inp-textarea" id="msgInput" placeholder="اكتب رسالة..." rows="1"
      oninput="autoResize(this);notifyTyping()"
      onkeypress="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendText();}"></textarea>
  </div>
  <button class="inp-side-btn" id="audioBtn" onclick="toggleRecord()" title="رسالة صوتية">
    <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>

function buildRetrySrc(src, attempt) {
  if (!src || /^data:|^blob:/.test(src)) return src;
  return src + (src.indexOf('?') === -1 ? '?' : '&') + '_imgRetry=' + attempt + '_' + Date.now();
}

function setStaticFallback(shimmerEl, fallbackBg) {
  if (!shimmerEl) return;
  shimmerEl.style.display = 'block';
  shimmerEl.style.animation = 'none';
  shimmerEl.style.background = fallbackBg || '#dddddd';
}

function loadImageWithRetry(imgEl, shimmerEl, src, opts) {
  opts = opts || {};
  const maxAttempts = typeof opts.maxAttempts === 'number' ? opts.maxAttempts : 15;
  const retryDelay = typeof opts.retryDelay === 'number' ? opts.retryDelay : 900;
  const loadedClass = opts.loadedClass || '';
  const fallbackBg = opts.fallbackBg || '#dddddd';
  const hideOnError = opts.hideOnError !== false;

  if (!imgEl) return;

  imgEl.style.display = 'none';
  imgEl.style.opacity = '0';
  if (loadedClass) imgEl.classList.remove(loadedClass);
  imgEl.removeAttribute('src');

  if (!src) {
    setStaticFallback(shimmerEl, fallbackBg);
    return;
  }

  let attempt = 0;
  let finished = false;

  function showLoaded(finalSrc) {
    if (finished) return;
    finished = true;
    imgEl.src = finalSrc;
    imgEl.style.display = 'block';
    requestAnimationFrame(function() {
      if (loadedClass) imgEl.classList.add(loadedClass);
      imgEl.style.opacity = '1';
    });
    if (shimmerEl) {
      shimmerEl.style.display = 'none';
    }
  }

  function failFinally() {
    if (finished) return;
    finished = true;
    if (hideOnError) {
      imgEl.removeAttribute('src');
      imgEl.style.display = 'none';
      imgEl.style.opacity = '0';
    }
    setStaticFallback(shimmerEl, fallbackBg);
  }

  function tryLoad() {
    const probe = new Image();
    const probeSrc = buildRetrySrc(src, attempt);

    probe.onload = function() {
      showLoaded(probeSrc);
    };

    probe.onerror = function() {
      attempt++;
      if (attempt < maxAttempts) {
        setTimeout(tryLoad, retryDelay);
      } else {
        failFinally();
      }
    };

    probe.src = probeSrc;
  }

  tryLoad();
}

/* ── تحميل بيانات الشخص الآخر من Firebase ── */
function loadOtherUser() {
  /* أولاً جرب participantDetails داخل الشات */
  db.ref('chats/'+chatId+'/participantDetails/'+otherUid).once('value', snap => {
    const d = snap.val()||{};
    if (d.name) otherName = d.name;
    if (d.avatar) otherAvSrc = d.avatar;

    /* إذا لم تكن الصورة موجودة، جلبها من users/ */
    if (!otherAvSrc) {
      db.ref('users/'+otherUid).once('value', s => {
        const u = s.val()||{};
        otherName  = u.yourname||u.name||otherName;
        otherAvSrc = u.avatar||'';
        applyHeader();
        ensureChatExists();
        startListening();
        document.getElementById('loader').style.display='none';
      });
    } else {
      applyHeader();
      ensureChatExists();
      startListening();
      document.getElementById('loader').style.display='none';

  });

  if (otherAvSrc) {
    if (sh) {

/* ── التأكد من وجود node الشات في Firebase ── */
function ensureChatExists() {
  if (!chatId || !otherUid) return;
  db.ref('chats/'+chatId).once('value', snap => {
    if (!snap.exists()) {
      /* إنشاء الشات لو لم يكن موجوداً (حالة profile → chat) */
      db.ref('chats/'+chatId).set({
        participants: {[myUid]:true, [otherUid]:true},
        participantDetails: {
          [myUid]:  {name:me.name,  avatar:me.avatar||''},
          [otherUid]: {name:otherName, avatar:otherAvSrc||''}
        },
        lastMessage: '',
        lastMessageTime: firebase.database.ServerValue.TIMESTAMP,
        unread: {[myUid]:0, [otherUid]:0}
      });
    } else {
      /* تحديث صورة الطرف الآخر إن كانت فارغة */
      const details = snap.val().participantDetails||{};
      if (otherAvSrc && (!details[otherUid]||!details[otherUid].avatar)) {
        db.ref('chats/'+chatId+'/participantDetails/'+otherUid+'/avatar').set(otherAvSrc);
      }
      if (otherName && (!details[otherUid]||!details[otherUid].name)) {
        db.ref('chats/'+chatId+'/participantDetails/'+otherUid+'/name').set(otherName);
      }
    }
  });
}

/* ══ استماع للرسائل — child_added + child_removed + child_changed ══ */
function listenMessages() {
  const ref = db.ref('chats/'+chatId+'/messages').orderByChild('createdAt').limitToLast(100);

  /* رسالة جديدة */
  ref.on('child_added', snap => {
    const msg = snap.val();
    if (!msg) return;
    /* تجاهل الرسائل المحذوفة بحقي */
    if (msg.deletedFor && msg.deletedFor[myUid]) return;
    renderMsg(msg, snap.key);
    markRead();
  });

  /* رسالة محذوفة "للجميع" — إزالة فورية من الواجهة */
  db.ref('chats/'+chatId+'/messages').on('child_removed', snap => {
    const el = document.getElementById('msg_'+snap.key);
    if (el) {
      el.style.transition = 'opacity .2s';
      el.style.opacity = '0';
      setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 220);
    }
  });

  /* تحديث رسالة — isRead أو deletedFor ══ */
  db.ref('chats/'+chatId+'/messages').on('child_changed', snap => {
    const msg = snap.val();
    if (!msg) return;
    const el = document.getElementById('msg_'+snap.key);

    /* إذا أضيف إلى deletedFor الخاص بي — احذف العنصر */
    if (msg.deletedFor && msg.deletedFor[myUid]) {
      if (el) {
        el.style.transition = 'opacity .2s';
        el.style.opacity = '0';
        setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 220);
      }
      return;
    }

    /* تحديث شارة isRead فقط */
    if (el && msg.senderId === myUid) {
      const ticksEl = el.querySelector('.read-ticks');
      if (ticksEl) {
        ticksEl.innerHTML = msg.isRead
          ? `<svg viewBox="0 0 16 11"><path d="M1 5.5L5 9.5L11 1" stroke="#4fc3f7" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 5.5L9 9.5L15 1" stroke="#4fc3f7" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`
          : `<svg viewBox="0 0 16 11"><path d="M1 5.5L5 9.5L11 1" stroke="#aaa" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 5.5L9 9.5L15 1" stroke="#aaa" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
      }
    }
  });
}

/* ══ رسم رسالة ══ */
function renderMsg(msg, key) {
  if (!msg) return;
  const area = document.getElementById('msgsArea');
  const isMine = msg.senderId === myUid;
  const ts     = typeof msg.createdAt === 'number' ? msg.createdAt : Date.now();
  const dateStr = new Date(ts).toLocaleDateString(_lang==='ar'?'ar':'en-US');
  const timeStr = new Date(ts).toLocaleTimeString(_lang==='ar'?'ar':'en-US', {hour:'2-digit', minute:'2-digit'});

  /* فاصل التاريخ */
  if (dateStr !== lastDateStr) {
    lastDateStr = dateStr;
    lastMsgSenderId = null;
    const sep = document.createElement('div');
    sep.className = 'date-sep';
    sep.innerHTML = `<span>${dateStr}</span>`;
    area.appendChild(sep);
  }

  /* صورة المرسل — shimmer أثناء التحميل، تختفي عند النجاح، لا حروف */
  const avId  = 'av_'+key;
  const avSkId = 'avsk_'+key;
  const avSrc = isMine ? (me.avatar || '') : (otherAvSrc || '');
  const avHtml = avSrc
    ? `<div class="msg-av-wrap" id="avwrap_${key}">
        <div id="${avSkId}" class="msg-av-sk sk"></div>
        <img id="${avId}" class="msg-av" alt="">
      </div>`
    : `<div class="msg-av-wrap" id="avwrap_${key}">
        <div class="msg-av-sk" style="position:absolute;inset:0;border-radius:50%;z-index:1;width:100%;height:100%;background:#dddddd;"></div>
      </div>`;

  /* شارة القراءة */
  const ticksSvg = isMine ? (msg.isRead
    ? `<svg viewBox="0 0 16 11"><path d="M1 5.5L5 9.5L11 1" stroke="#4fc3f7" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 5.5L9 9.5L15 1" stroke="#4fc3f7" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`
    : `<svg viewBox="0 0 16 11"><path d="M1 5.5L5 9.5L11 1" stroke="#aaa" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 5.5L9 9.5L15 1" stroke="#aaa" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`)
    : '';

  /* محتوى الفقاعة */
  let bubbleContent = '';
  /* اقتباس رسالة سابقة */
  if (msg.replyTo) {
    bubbleContent += `<div class="msg-reply-quote">
      <div class="msg-reply-quote-name">${esc(msg.replyTo.senderName||'')}</div>
      <div class="msg-reply-quote-text">${esc(msg.replyTo.text||T('voiceOrImg'))}</div>
    </div>`;
  }
  if (msg.text) {
    bubbleContent += `<div style="white-space:pre-wrap;">${esc(msg.text)}</div>`;
  } else if (msg.imageUrl) {
    /* placeholder — الصورة تُبنى بـ JS بعد appendChild لضمان عمل onload */
    const skId  = 'msgsk_'+key;
    const imgId = 'msgimg_'+key;
    bubbleContent = `<div id="imgwrap_${key}" style="position:relative;width:160px;height:160px;border-radius:12px;overflow:hidden;display:inline-block;">
      <div id="${skId}" class="sk" style="position:absolute;inset:0;border-radius:12px;z-index:2;width:100%;height:100%;"></div>
    </div>`;
  } else if (msg.audioUrl) {
    /* فقاعة صوت مخصصة */
    const audioId = 'aud_'+key;
    bubbleContent = `<div class="audio-bubble">
      <button class="audio-play-btn" onclick="toggleAudio('${audioId}','${esc(msg.audioUrl)}')" id="btn_${audioId}">
        <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3" fill="white"/></svg>
      </button>
      <div class="audio-wave" id="wave_${audioId}">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <span class="audio-dur" id="dur_${audioId}">0:00</span>
    </div>`;
  }

  const metaHtml = `<div class="msg-meta"><span class="msg-time-txt">${timeStr}</span>${isMine?`<span class="read-ticks">${ticksSvg}</span>`:''}</div>`;

  const senderId = msg.senderId;
  const isNewGroup = senderId !== lastMsgSenderId;

  /* إخفاء صورة الرسالة السابقة من نفس المرسل */
  if (!isNewGroup) {
    const prevRows = area.querySelectorAll('.msg-row.' + (isMine ? 'mine' : 'theirs'));
    if (prevRows.length > 0) {
      const lastRow = prevRows[prevRows.length - 1];
      const prevAv = lastRow.querySelector('.msg-av-wrap');
      if (prevAv) prevAv.classList.add('hidden');
      lastRow.style.marginBottom = '1px';
    }
  }

  lastMsgSenderId = senderId;

  const row = document.createElement('div');
  row.className = `msg-row ${isMine?'mine':'theirs'}`;
  row.id = 'msg_'+key;
  row.style.cssText = 'position:relative;margin-bottom:6px;';
  const bubbleHtml = `<div class="msg-bubble">${bubbleContent}${metaHtml}</div>`;
  row.innerHTML = isMine
    ? bubbleHtml + avHtml
    : avHtml + bubbleHtml;

  /* longpress أو double-tap لفتح قائمة الخيارات */
  const bubble = row.querySelector('.msg-bubble');
  let pressTimer = null;
  bubble.addEventListener('touchstart', () => {
    pressTimer = setTimeout(() => openMsgMenu(msg, key, isMine, bubble), 500);
  }, {passive:true});
  bubble.addEventListener('touchend', () => clearTimeout(pressTimer));
  bubble.addEventListener('touchmove', () => clearTimeout(pressTimer));
  bubble.addEventListener('contextmenu', e => { e.preventDefault(); openMsgMenu(msg, key, isMine, bubble); });
  bubble.addEventListener('dblclick', () => openMsgMenu(msg, key, isMine, bubble));

  area.appendChild(row);

  if (avSrc) {
    const rowAvEl = document.getElementById(avId);
    const rowSkEl = document.getElementById(avSkId);
    if (rowAvEl) {
      loadImageWithRetry(rowAvEl, rowSkEl, avSrc, {fallbackBg:'#dddddd'});
    }
  }

  /* بناء صورة الرسالة بـ JS بعد إضافة الـ row للـ DOM لضمان عمل onload */
  if (msg.imageUrl) {
    const wrap = document.getElementById('imgwrap_'+key);
    const sk   = document.getElementById('msgsk_'+key);
    if (wrap) {
      const imgEl = document.createElement('img');
      imgEl.id = 'msgimg_'+key;
      imgEl.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;opacity:0;transition:opacity .4s ease;z-index:1;border-radius:12px;object-fit:cover;cursor:pointer;display:none;';
      imgEl.addEventListener('click', function() { openImg(msg.imageUrl); });
      wrap.appendChild(imgEl);
      loadImageWithRetry(imgEl, sk, msg.imageUrl, {fallbackBg:'#e0e0e0'});
    }
  }

  area.scrollTop = area.scrollHeight;
}

/* ══ إرسال نص ══ */
function sendText() {
  const inp  = document.getElementById('msgInput');
  const text = inp.value.trim();

  /* إرسال صورة إذا كانت معلقة */
  if (pendingImgBlob) { doSendImage(); return; }
  if (!text || !me) return;

  const now = Date.now();
  if (sendText._last && now - sendText._last < 800) return;
  sendText._last = now;

  inp.value = ''; autoResize(inp);

  const msg = { senderId:myUid, text, createdAt:firebase.database.ServerValue.TIMESTAMP, isRead:false };
  if (replyData) {
    msg.replyTo = { senderName: replyData.senderName, text: replyData.text };
    replyData = null;
    document.getElementById('replyBar').classList.remove('show');
  }
  db.ref('chats/'+chatId+'/messages').push(msg);
  db.ref('chats/'+chatId).update({
    lastMessage: text,
    lastMessageTime: firebase.database.ServerValue.TIMESTAMP,
    [`unread/${otherUid}`]: firebase.database.ServerValue.increment(1),
    /* تأكد من وجود participants وdetails */
    [`participants/${myUid}`]: true,
    [`participants/${otherUid}`]: true,
    [`participantDetails/${myUid}/name`]: me.name,
    [`participantDetails/${myUid}/avatar`]: me.avatar||'',
    [`participantDetails/${otherUid}/name`]: otherName,
    [`participantDetails/${otherUid}/avatar`]: otherAvSrc||''
  });

  /* إشعار */
  db.ref('notifications').push({
    type:'message', fromUserId:myUid, toUserId:otherUid,
    text:T('sendNotif'), createdAt:firebase.database.ServerValue.TIMESTAMP, isRead:false
  });

  /* إيقاف مؤشر الكتابة */
  db.ref('chats/'+chatId+'/typing/'+myUid).set(false);
}

/* ══ اختيار صورة ══ */
function onImgSelected(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const max = 900; let w=img.width, h=img.height;
      if(w>max){h=h*(max/w);w=max;}
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      canvas.toBlob(blob => {
        pendingImgBlob = blob;
        document.getElementById('imgPreviewThumb').src = e.target.result;
        document.getElementById('imgPreviewWrap').classList.add('show');
      },'image/jpeg',0.82);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  input.value='';
}

function cancelImgPreview() {
  pendingImgBlob = null;
  document.getElementById('imgPreviewWrap').classList.remove('show');
}

function doSendImage() {
  if (!pendingImgBlob) return;
  const blob = pendingImgBlob;
  cancelImgPreview();

  /* عرض placeholder shimmer أثناء الرفع */
  const tempKey = 'tmp_'+Date.now();

  placeholder.innerHTML = `
    <div class="msg-bubble" style="padding:4px;">
      <div style="position:relative;width:160px;height:160px;border-radius:12px;overflow:hidden;">

  if (avSrcMine) {

    const tmpSkEl = placeholder.querySelector('.msg-av-sk');
    if (tmpAvEl) {
      loadImageWithRetry(tmpAvEl, tmpSkEl, avSrcMine, {fallbackBg:'#dddddd'});

  /* رفع الصورة إلى Cloudinary */
  uploadToCloudinary(blob).then(function(url) {

    const el = document.getElementById('msg_'+tempKey);
    if (el) el.remove();
    /* إرسال الرسالة — child_added سيرسمها مع shimmer تلقائياً */
    const msg = {senderId:myUid, imageUrl:url, createdAt:firebase.database.ServerValue.TIMESTAMP, isRead:false};
    db.ref('chats/'+chatId+'/messages').push(msg);
    db.ref('chats/'+chatId).update({
      lastMessage: T('photoMsg'),
      lastMessageTime:firebase.database.ServerValue.TIMESTAMP,
      ['unread/'+otherUid]:firebase.database.ServerValue.increment(1),
      ['participants/'+myUid]:true,
      ['participants/'+otherUid]:true,
      ['participantDetails/'+myUid+'/name']:me.name,
      ['participantDetails/'+myUid+'/avatar']:me.avatar||'',
      ['participantDetails/'+otherUid+'/name']:otherName,
      ['participantDetails/'+otherUid+'/avatar']:otherAvSrc||''
    });
  }).catch(err=>{
    console.error('upload error', err);
    const el = document.getElementById('msg_'+tempKey);
    if(el) el.remove();
  });
}

/* ══ تسجيل صوتي ══ */
let recTimerInterval = null, recSeconds = 0;

async function toggleRecord() {
  if (!isRecording) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      /* تحديد الصيغة المدعومة مرة واحدة وتمريرها للـ MediaRecorder */
      const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
        ? 'audio/webm;codecs=opus'
        : MediaRecorder.isTypeSupported('audio/webm')
          ? 'audio/webm'
          : MediaRecorder.isTypeSupported('audio/ogg;codecs=opus')
            ? 'audio/ogg;codecs=opus'
            : '';
      const options = mimeType ? {mimeType} : {};
      mediaRecorder = new MediaRecorder(stream, options);
      audioChunks = [];
      mediaRecorder.ondataavailable = e => { if (e.data && e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.start(100);
      isRecording = true;
      recSeconds = 0;
      document.getElementById('recTimer').textContent = '0:00';
      document.getElementById('recBar').classList.add('show');
      recTimerInterval = setInterval(()=>{
        recSeconds++;
        const m = Math.floor(recSeconds/60), s = recSeconds%60;
        document.getElementById('recTimer').textContent = m+':'+(s<10?'0':'')+s;
      }, 1000);
    } catch(e) { console.warn('mic error', e); }
  }
}

function stopAndSendAudio() {
  if (!isRecording || !mediaRecorder) return;
  mediaRecorder.onstop = _doSendAudio;
  mediaRecorder.stop();
  mediaRecorder.stream.getTracks().forEach(t=>t.stop());
  isRecording = false;
  clearInterval(recTimerInterval);
  document.getElementById('recBar').classList.remove('show');
}

function cancelRecord() {
  if (!isRecording || !mediaRecorder) return;
  mediaRecorder.onstop = null;
  mediaRecorder.stop();
  mediaRecorder.stream.getTracks().forEach(t=>t.stop());
  isRecording = false;
  clearInterval(recTimerInterval);
  document.getElementById('recBar').classList.remove('show');
  audioChunks = [];
}

function _doSendAudio() {
  if (!audioChunks.length) return;
  /* استخدام نفس الصيغة التي سجّل بها mediaRecorder بالضبط */
  const mimeType = (mediaRecorder && mediaRecorder.mimeType) ? mediaRecorder.mimeType : 'audio/webm';
  const blob = new Blob(audioChunks, {type: mimeType});
  audioChunks = [];
  uploadToCloudinary(blob).then(function(url) {
    const msg = {senderId:myUid, audioUrl:url, createdAt:firebase.database.ServerValue.TIMESTAMP, isRead:false};
    db.ref('chats/'+chatId+'/messages').push(msg);
    db.ref('chats/'+chatId).update({
      lastMessage: T('audioMsg'),
      lastMessageTime: firebase.database.ServerValue.TIMESTAMP,
      [`unread/${otherUid}`]: firebase.database.ServerValue.increment(1)
    });
  }).catch(err=>{ console.error('audio upload error', err); });
}

/* ══ تشغيل/إيقاف الصوت ══ */
const audioPlayers = {};
function toggleAudio(audioId, url) {
  const wave = document.getElementById('wave_'+audioId);
  const btn  = document.getElementById('btn_'+audioId);
  const dur  = document.getElementById('dur_'+audioId);

  const playSvg  = '<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3" fill="white"/></svg>';
  const pauseSvg = '<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16" fill="white"/><rect x="14" y="4" width="4" height="16" fill="white"/></svg>';

  if (!audioPlayers[audioId]) {
    const player = new Audio();
    player.preload = 'auto';
    player.src = url;
    audioPlayers[audioId] = player;

    player.addEventListener('timeupdate', ()=>{
      const t = player.currentTime;
      const m = Math.floor(t/60), s = Math.floor(t%60);
      if (dur) dur.textContent = m+':'+(s<10?'0':'')+s;
    });
    player.addEventListener('ended', ()=>{
      if (wave) wave.classList.remove('playing');
      if (btn) btn.innerHTML = playSvg;
      if (dur) dur.textContent = '0:00';
      player.currentTime = 0;
    });
    player.addEventListener('error', ()=>{
      if (wave) wave.classList.remove('playing');
      if (btn) btn.innerHTML = playSvg;
      console.warn('audio error for', audioId);
    });
  }

  const player = audioPlayers[audioId];
  if (player.paused) {
    /* إيقاف أي مشغل آخر نشط */
    Object.keys(audioPlayers).forEach(id=>{
      if(id !== audioId && !audioPlayers[id].paused){
        audioPlayers[id].pause();
        const w2=document.getElementById('wave_'+id), b2=document.getElementById('btn_'+id);
        if(w2) w2.classList.remove('playing');
        if(b2) b2.innerHTML = playSvg;
      }
    });
    /* تشغيل مع معالجة الأخطاء */
    const playPromise = player.play();
    if (playPromise !== undefined) {
      playPromise.then(()=>{
        if (wave) wave.classList.add('playing');
        if (btn) btn.innerHTML = pauseSvg;
      }).catch(err=>{
        console.warn('play failed:', err);
        if (wave) wave.classList.remove('playing');
        if (btn) btn.innerHTML = playSvg;
      });
    } else {
      if (wave) wave.classList.add('playing');
      if (btn) btn.innerHTML = pauseSvg;
    }
  } else {
    player.pause();
    if (wave) wave.classList.remove('playing');
    if (btn) btn.innerHTML = playSvg;
  }
}

/* ══ قائمة حذف الرسالة ══ */
function openDelMenu(e, msgKey, isMineStr) {
  e.stopPropagation();
  const isMine = isMineStr === 'true';
  const menu = document.getElementById('delMenu');
  const ovl  = document.getElementById('delOverlay');

  const trashSvg = '<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>';
  const meSvg    = '<svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';

  menu.innerHTML = `
    <div class="del-menu-item" onclick="deleteMsg('${msgKey}','me')">
      ${meSvg} ${T('deleteMe')}
    </div>
    ${isMine ? `<div class="del-menu-sep"></div>
    <div class="del-menu-item danger" onclick="deleteMsg('${msgKey}','all')">
      ${trashSvg} ${T('deleteAll')}
    </div>` : ''}`;

  const r = e.currentTarget.getBoundingClientRect();
  let top = r.bottom + 4, left = r.left - 180;
  if (top + 110 > window.innerHeight) top = r.top - 114;
  if (left < 8) left = 8;
  menu.style.cssText = `display:block;top:${top}px;left:${left}px;`;
  ovl.style.display = 'block';
}

function closeDelMenu() {
  document.getElementById('delMenu').style.display = 'none';
  document.getElementById('delOverlay').style.display = 'none';
}

function deleteMsg(msgKey, scope) {
  closeDelMenu();
  const msgRef = db.ref('chats/'+chatId+'/messages/'+msgKey);
  if (scope === 'all') {
    msgRef.remove();
  } else {
    /* حذف مني فقط — نضيف uid المستخدم لقائمة المحذوفين */
    msgRef.child('deletedFor/'+myUid).set(true);
  }
  /* إخفاء العنصر فوراً من الواجهة */
  const el = document.getElementById('msg_'+msgKey);
  if (el) { el.style.opacity='0'; el.style.transition='opacity .25s'; setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); },260); }
}

/* ── Cloudinary Upload Helper ── */
async function uploadToCloudinary(file, onProgress) {
    return new Promise(function(resolve, reject) {
        var xhr = new XMLHttpRequest();
        var fd  = new FormData();
        fd.append('file', file);
        fd.append('upload_preset', 'my_app_upload');
        var resType = (file.type && (file.type.startsWith('video/') || file.type.startsWith('audio/'))) ? 'video' : 'image';
        if (xhr.upload && onProgress) {
            xhr.upload.addEventListener('progress', function(e) {
                if (e.lengthComputable) onProgress(Math.round(e.loaded / e.total * 100));
            });
        }
        xhr.addEventListener('load', function() {
            if (xhr.status === 200) {
                var d = JSON.parse(xhr.responseText);
                d.secure_url ? resolve(d.secure_url) : reject(new Error(d.error ? d.error.message : 'Upload failed'));
            } else { reject(new Error('HTTP ' + xhr.status)); }
        });
        xhr.addEventListener('error', function() { reject(new Error('Network error')); });
        xhr.open('POST', 'https://api.cloudinary.com/v1_1/dlujoziwz/' + resType + '/upload');
        xhr.send(fd);
    });
}
